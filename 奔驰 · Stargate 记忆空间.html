<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="robots" content="noindex,nofollow"/>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>奔驰 · Stargate 记忆空间</title>
<!--
  Stargate 记忆空间 · Hero(第一步)
  灵动岛绽放 → 记忆球转轮(转轮 + 记忆星空)→ 点球就地展开 → 返回
  四类球:过去卡片(天气/比赛) · 对话总结记忆 · 生成壁纸 · 特殊 moment(提车100天)
  纯软件、单文件;球空间是 stage 上一层"绽放浮层";转轮=旋钮就绪(滑动=软旋钮)。
  下一步再加:当下沉淀入岛 · 留存/消散手势 · 泊车/行车安全区自适应。
-->
<style>
  :root{
    --ink:#eef1f4;--soft:rgba(238,241,244,.62);--faint:rgba(238,241,244,.4);
    --ring:conic-gradient(from 210deg,#7ab7ff,#c08bff,#ff9bb0,#ffd27a,#8be0c0,#7ab7ff);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#04060a;overflow:hidden;color:var(--ink);
    font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased}
  .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .stage{position:relative;width:1300px;height:812px;overflow:hidden;transform-origin:center center;border-radius:20px;box-shadow:0 40px 120px rgba(0,0,0,.7)}

  /* ── 深空背景(非平铺深蓝,带极淡星云冷暖)── */
  .space{position:absolute;inset:0;z-index:0;
    background:
      radial-gradient(115% 80% at 50% 14%, rgba(64,96,150,.20), transparent 55%),
      radial-gradient(85% 70% at 80% 82%, rgba(120,82,156,.17), transparent 60%),
      radial-gradient(80% 80% at 16% 78%, rgba(38,112,124,.13), transparent 60%),
      linear-gradient(180deg,#0a0e17,#070a12 58%,#05070d);
    opacity:0;transition:opacity 1.1s ease}
  .stage.bloomed .space{opacity:1}
  #dust{position:absolute;inset:0;width:100%;height:100%}
  .vignette{position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 100% at 50% 50%,transparent 58%,rgba(3,5,10,.55))}

  /* ── 顶部标题 ── */
  .hd{position:absolute;top:40px;left:0;right:0;z-index:8;text-align:center;opacity:0;transform:translateY(-8px);transition:opacity .7s ease .25s,transform .7s ease .25s;pointer-events:none}
  .stage.bloomed .hd{opacity:1;transform:none}
  .hd .t{font-size:21px;font-weight:300;letter-spacing:3px}
  .hd .t b{font-weight:650}
  .hd .s{margin-top:7px;font-size:12px;letter-spacing:.22em;color:var(--faint);text-transform:uppercase}

  /* ── 灵动岛(入口/收束点)── */
  .island{position:absolute;top:30px;left:50%;transform:translateX(-50%);z-index:20;
    display:flex;align-items:center;gap:10px;padding:9px 17px 9px 11px;border-radius:24px;
    background:rgba(16,20,30,.82);backdrop-filter:blur(20px) saturate(1.2);
    box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.1);cursor:pointer;
    transition:opacity .5s ease,transform .6s cubic-bezier(.4,1.3,.5,1)}
  .island .io{width:22px;height:22px;border-radius:50%;position:relative;flex:none}
  .island .io::before{content:"";position:absolute;inset:0;border-radius:50%;background:var(--ring);filter:blur(.4px);animation:spin 6s linear infinite}
  .island .io::after{content:"";position:absolute;inset:5px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff,rgba(255,255,255,.6))}
  .island .il{font-size:13px;font-weight:600;color:#eef1f4;white-space:nowrap}
  .island .il b{color:#bcd4ff}
  .stage.bloomed .island{opacity:0;transform:translateX(-50%) translateY(-14px) scale(.9);pointer-events:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── 转轮 ── */
  .wheel{position:absolute;inset:0;z-index:6}
  .orb{position:absolute;left:50%;top:50%;width:230px;height:230px;margin:-115px 0 0 -115px;
    will-change:transform,opacity,filter;touch-action:none}
  .orb .float{width:100%;height:100%;position:relative;animation:bob 6s ease-in-out infinite}
  /* 玻璃/记忆球体 */
  .ball{position:absolute;inset:0;border-radius:50%;overflow:hidden;
    background:
      radial-gradient(circle at 34% 26%, rgba(255,255,255,.22), rgba(255,255,255,.05) 38%, rgba(10,15,26,.42) 72%, rgba(6,10,18,.62)),
      radial-gradient(circle at 68% 78%, rgba(120,160,220,.16), transparent 55%);
    box-shadow:0 24px 60px rgba(0,0,0,.5), inset 0 2px 10px rgba(255,255,255,.18), inset 0 -16px 30px rgba(0,0,0,.4);
    backdrop-filter:blur(2px)}
  .ball::after{content:"";position:absolute;left:20%;top:13%;width:30%;height:22%;border-radius:50%;
    background:radial-gradient(circle,rgba(255,255,255,.55),transparent 70%);filter:blur(3px);opacity:.7}
  /* 光环(avatar 光)*/
  .ring{position:absolute;inset:-7px;border-radius:50%;padding:7px;background:var(--ring);
    -webkit-mask:radial-gradient(circle, transparent calc(50% - 0.5px), #000 50%);mask:radial-gradient(circle, transparent calc(50% - 0.5px), #000 50%);
    filter:blur(.4px);opacity:.0;transition:opacity .5s ease}
  .ringglow{position:absolute;inset:-6px;border-radius:50%;background:var(--ring);filter:blur(16px);opacity:0;transition:opacity .55s ease}
  .orb.focus .ring{opacity:.95;animation:ringbreath 4.5s ease-in-out infinite}
  .orb.focus .ringglow{opacity:.45;animation:glowbreath 4.5s ease-in-out infinite}
  .orb:not(.focus) .ring{opacity:.3}
  @keyframes ringbreath{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.025);opacity:1}}
  @keyframes glowbreath{0%,100%{opacity:.34}50%{opacity:.6}}
  @keyframes bob{0%,100%{transform:translateY(-6px)}50%{transform:translateY(6px)}}
  /* 球内"封存"的一瞥 */
  .glimpse{position:absolute;inset:0;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:7px;padding:30px}
  .glimpse .em{font-size:42px;line-height:1;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4))}
  .glimpse .gl{font-size:15px;font-weight:600;color:#fff;opacity:0;transform:translateY(4px);transition:opacity .45s ease,transform .45s ease}
  .glimpse .gs{font-size:11.5px;color:rgba(255,255,255,.66);opacity:0;transition:opacity .45s ease .04s}
  .orb.focus .glimpse .gl,.orb.focus .glimpse .gs{opacity:1;transform:none}
  .orb:not(.focus) .glimpse{filter:saturate(.7) brightness(.86)}
  /* 影像球(壁纸):整颗是图 */
  .ball.img{background:none}
  .ball.img .pic{position:absolute;inset:0}
  .ball.img::before{content:"";position:absolute;inset:0;border-radius:50%;z-index:2;
    box-shadow:inset 0 2px 12px rgba(255,255,255,.28), inset 0 -18px 34px rgba(0,0,0,.45)}
  .ball.img .glassveil{position:absolute;inset:0;z-index:1;background:radial-gradient(circle at 34% 26%,rgba(255,255,255,.28),transparent 42%)}
  /* moment 球:更隆重 */
  .orb.moment .ball{background:
      radial-gradient(circle at 36% 28%, rgba(255,236,200,.3), rgba(255,205,150,.08) 40%, rgba(40,24,12,.5) 74%, rgba(20,12,8,.66)),
      radial-gradient(circle at 70% 76%, rgba(255,170,90,.18), transparent 55%)}
  .orb.moment .ring{--ring:conic-gradient(from 200deg,#ffd27a,#ffb066,#ff9bb0,#ffe1a6,#ffd27a)}
  .orb.moment .spk{position:absolute;inset:0;border-radius:50%;pointer-events:none;overflow:hidden}
  .orb.moment .spk i{position:absolute;width:3px;height:3px;border-radius:50%;background:#ffe7b8;box-shadow:0 0 6px #ffd27a;opacity:.0;animation:spark 3.2s ease-in-out infinite}

  /* ── 底部"软旋钮"刻度 ── */
  .dial{position:absolute;left:50%;bottom:54px;transform:translateX(-50%);z-index:8;
    display:flex;flex-direction:column;align-items:center;gap:13px;opacity:0;transition:opacity .6s ease .35s}
  .stage.bloomed .dial{opacity:1}
  .ticks{position:relative;width:300px;height:26px;overflow:hidden;-webkit-mask:linear-gradient(90deg,transparent,#000 22%,#000 78%,transparent);mask:linear-gradient(90deg,transparent,#000 22%,#000 78%,transparent)}
  .ticks .row{position:absolute;left:50%;top:50%;display:flex;gap:0;transform:translate(-50%,-50%);transition:transform .5s cubic-bezier(.2,.8,.2,1)}
  .ticks .row span{display:block;width:34px;text-align:center;font-size:10px;color:rgba(255,255,255,.32);font-weight:600;letter-spacing:.05em}
  .ticks .row span.on{color:#cfe0ff}
  .ticks .mark{position:absolute;left:50%;top:0;bottom:0;width:2px;transform:translateX(-50%);background:linear-gradient(180deg,#9fc2ff,transparent);border-radius:2px}
  .dial .knob{width:40px;height:40px;border-radius:50%;position:relative;background:radial-gradient(circle at 38% 34%,#27313f,#10151d);box-shadow:0 6px 16px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.1)}
  .dial .knob::before{content:"";position:absolute;inset:-2px;border-radius:50%;background:var(--ring);filter:blur(2px);opacity:.5;-webkit-mask:radial-gradient(circle,transparent 60%,#000 62%);mask:radial-gradient(circle,transparent 60%,#000 62%)}
  .dial .knob i{position:absolute;left:50%;top:6px;width:3px;height:9px;border-radius:2px;background:#bcd4ff;transform:translateX(-50%);transform-origin:50% 14px;transition:transform .5s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 6px rgba(159,194,255,.8)}

  .hint{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:8;font-size:11.5px;letter-spacing:.14em;color:var(--faint);opacity:0;transition:opacity .6s ease .5s}
  .stage.bloomed .hint{opacity:1}

  /* ── 就地展开(覆盖球空间)── */
  .exp{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;padding:54px}
  .exp.show{display:flex}
  .exp .scrim{position:absolute;inset:0;background:rgba(4,6,11,.34);opacity:0;transition:opacity .45s ease}
  .exp.show .scrim{opacity:1}
  .exp .card{position:relative;width:720px;max-width:90%;max-height:84%;overflow:auto;border-radius:30px;padding:34px 40px;color:#fff;opacity:0;transform:scale(.86);
    transition:opacity .52s cubic-bezier(.2,.9,.25,1),transform .52s cubic-bezier(.2,.9,.25,1);
    background:rgba(15,21,32,.78);backdrop-filter:blur(34px) saturate(1.2);box-shadow:0 50px 130px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.1),0 0 80px rgba(120,150,230,.14)}
  .exp.show .card{opacity:1;transform:none}
  /* 展开 = 转轮就地隐去、内容替换整片空间(球"打开",非中央弹窗) */
  .stage.detail .wheel,.stage.detail .dial,.stage.detail .hint,.stage.detail .hd{opacity:0!important;pointer-events:none;transition:opacity .4s ease}
  .exp .back{position:absolute;top:18px;left:18px;z-index:3;display:flex;align-items:center;gap:6px;border:0;cursor:pointer;font-family:inherit;font-size:13px;font-weight:650;color:#cfe0ff;background:rgba(91,140,255,.16);box-shadow:inset 0 0 0 1px rgba(91,140,255,.3);padding:7px 13px 7px 11px;border-radius:11px}
  .exp .back:hover{background:rgba(91,140,255,.3)}

  /* 展开内容样式 */
  .xw{position:relative}
  .xtag{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.04em;color:#cfe0ff;background:rgba(91,140,255,.16);padding:4px 11px;border-radius:20px;margin-bottom:14px}
  .x-weather .big{font-size:64px;font-weight:200;line-height:.95}.x-weather .big sup{font-size:22px;vertical-align:top}
  .x-weather .loc{font-size:15px;font-weight:600}.x-weather .sub{font-size:13px;color:var(--soft);margin-top:4px}
  .x-weather .hrs{display:flex;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,.14)}
  .x-weather .hr{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:12px;color:var(--soft)}.x-weather .hr b{font-size:13px;color:#fff;font-weight:600}
  .x-match .row{display:flex;align-items:center;gap:12px;padding:10px 0;font-size:14px}.x-match .row+.row{border-top:1px solid rgba(255,255,255,.07)}
  .x-match .rk{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;background:rgba(255,255,255,.08)}.x-match .rk.top{background:#ffcf6a;color:#0b0a14}
  .x-match .tm{flex:1;font-weight:600}.x-match .pt{font-weight:800;font-size:16px}
  .x-mem{font-size:17px;line-height:1.7;font-weight:400;color:#f3f5f8}.x-mem .q{font-size:19px;line-height:1.6}.x-mem .meta{margin-top:16px;font-size:12.5px;color:var(--faint);letter-spacing:.04em}
  .x-wall{position:relative;border-radius:18px;overflow:hidden;height:300px;display:flex;align-items:flex-end}
  .x-wall .ph{position:absolute;inset:0}.x-wall .cap{position:relative;padding:18px;font-size:14px;font-weight:600;text-shadow:0 2px 10px rgba(0,0,0,.5)}.x-wall .cap span{display:block;font-size:11.5px;color:rgba(255,255,255,.8);font-weight:400;margin-top:3px}
  .x-moment{text-align:center}
  .x-moment .num{font-size:74px;font-weight:200;line-height:1;background:linear-gradient(120deg,#ffe1a6,#ffb066);-webkit-background-clip:text;background-clip:text;color:transparent}
  .x-moment .ttl{font-size:15px;letter-spacing:.2em;color:#ffd9a0;margin-top:4px}
  .x-moment .stats{display:flex;justify-content:center;gap:26px;margin:20px 0 16px}
  .x-moment .st b{display:block;font-size:24px;font-weight:300}.x-moment .st span{font-size:11.5px;color:var(--soft)}
  .x-moment .bless{font-size:15px;color:#fff;line-height:1.7}

  /* 极光壁纸(纯 CSS 生成感)*/
  .aurora{background:
    radial-gradient(80% 60% at 20% 30%, rgba(120,220,200,.6), transparent 60%),
    radial-gradient(70% 70% at 80% 25%, rgba(150,130,255,.55), transparent 60%),
    radial-gradient(90% 80% at 60% 90%, rgba(255,140,190,.45), transparent 60%),
    linear-gradient(160deg,#0a1f2a,#1a1430 60%,#2a1430)}

  /* ── 开发面板 ── */
  .panel{position:fixed;top:18px;right:18px;width:230px;z-index:100;background:rgba(20,22,26,.9);backdrop-filter:blur(20px);border-radius:16px;padding:15px;color:#e8eaee;font-size:12.5px;box-shadow:0 20px 50px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.08);opacity:.3;transform:scale(.86);transform-origin:top right;transition:.3s}
  .panel:hover{opacity:1;transform:none}
  .panel .ti{font-size:13.5px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;margin-bottom:11px}.panel .ti i{width:8px;height:8px;border-radius:50%;background:var(--ring)}
  .panel .ask{width:100%;border:0;border-radius:12px;cursor:pointer;font-family:inherit;font-weight:600;font-size:13.5px;padding:12px;color:#fff;background:linear-gradient(135deg,#5b8cff,#7a5bff)}
  .panel .ph{margin-top:10px;font-size:11px;color:#8b9098;border-top:1px solid rgba(255,255,255,.08);padding-top:9px}.panel .ph b{color:#9fe7b8}
  @keyframes spark{0%,100%{opacity:0;transform:translateY(0) scale(.6)}40%{opacity:.9}60%{opacity:.7}100%{opacity:0;transform:translateY(-10px) scale(1)}}
</style>
<style id="__aiosgate_css">
#__aiosgate{position:fixed;inset:0;z-index:2147483647;background:radial-gradient(130% 130% at 50% -10%,#141b27 0%,#0a0e15 48%,#05070b 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
#__aiosgate *{box-sizing:border-box}
#__aiosgate .gcard{width:340px;max-width:86vw;text-align:center;padding:40px 34px 30px}
#__aiosgate .gorb{width:62px;height:62px;border-radius:50%;margin:0 auto 22px;background:conic-gradient(from 210deg,#7ab7ff,#c08bff,#ff9bb0,#ffd27a,#8be0c0,#7ab7ff);box-shadow:0 0 30px rgba(140,180,255,.45),inset 0 0 16px rgba(255,255,255,.35);animation:__gspin 7s linear infinite}
#__aiosgate .gt{font-size:19px;font-weight:680;letter-spacing:.2px;color:#fff;margin:0 0 6px}
#__aiosgate .gs{font-size:12.5px;color:rgba(255,255,255,.5);margin:0 0 26px;letter-spacing:.04em}
#__aiosgate .gin{width:100%;height:46px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:15px;text-align:center;letter-spacing:.18em;outline:none;transition:border-color .2s,background .2s,box-shadow .2s}
#__aiosgate .gin::placeholder{letter-spacing:.06em;color:rgba(255,255,255,.32)}
#__aiosgate .gin:focus{border-color:rgba(127,200,255,.6);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(91,140,255,.18)}
#__aiosgate .gb{width:100%;height:46px;margin-top:12px;border:0;border-radius:13px;background:linear-gradient(150deg,#5b8cff,#7a5bff);color:#fff;font-size:14.5px;font-weight:640;letter-spacing:.04em;cursor:pointer;transition:filter .2s,transform .1s}
#__aiosgate .gb:hover{filter:brightness(1.08)}
#__aiosgate .gb:active{transform:scale(.985)}
#__aiosgate .ge{height:16px;margin-top:13px;font-size:12px;color:#ff8086;opacity:0;transition:opacity .2s}
#__aiosgate .gf{margin-top:22px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.26)}
@keyframes __gspin{to{transform:rotate(360deg)}}
@keyframes __gshake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-7px)}}
</style>
<script>
(function(){
  var KEY='aios_demo_unlock_v1';
  var HASH='cc35f579797e106bb3ea97001fc565e8eb7d6b0a385920f2fc6721ddcc606d59';
  function ok(){try{return localStorage.getItem(KEY)===HASH;}catch(e){return false;}}
  if(ok())return;
  function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){return Array.prototype.map.call(new Uint8Array(b),function(x){return ('0'+x.toString(16)).slice(-2);}).join('');});}
  function build(){
    if(document.getElementById('__aiosgate'))return;
    var ov=document.createElement('div');
    ov.id='__aiosgate';
    ov.innerHTML='<div class="gcard"><div class="gorb"></div><div class="gt">AIOS Dynamic Window</div><div class="gs">Mercedes-Benz · MVA — Private preview</div><input class="gin" id="__gp" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter password"><button class="gb" id="__gb">Unlock</button><div class="ge" id="__ge">Incorrect password</div><div class="gf">Authorized access only</div></div>';
    (document.body||document.documentElement).appendChild(ov);
    var inp=document.getElementById('__gp'),btn=document.getElementById('__gb'),err=document.getElementById('__ge'),card=ov.querySelector('.gcard'),busy=false;
    function go(){
      if(busy)return;busy=true;
      sha(inp.value||'').then(function(h){
        busy=false;
        if(h===HASH){try{localStorage.setItem(KEY,HASH);}catch(e){}ov.style.transition='opacity .4s ease';ov.style.opacity='0';setTimeout(function(){if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);},420);}
        else{err.style.opacity='1';inp.value='';card.style.animation='__gshake .42s';setTimeout(function(){card.style.animation='';},440);try{inp.focus();}catch(e){}}
      });
    }
    btn.addEventListener('click',go);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')go();else err.style.opacity='0';});
    setTimeout(function(){try{inp.focus();}catch(e){}},120);
  }
  if(document.documentElement)build();else document.addEventListener('DOMContentLoaded',build);
})();
</script>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="space"><canvas id="dust"></canvas></div>
    <div class="vignette"></div>

    <div class="hd" id="hd"><div class="t">沉淀下来的<b>记忆</b></div><div class="s">Stargate · Memory Space</div></div>

    <div class="island" id="island"><span class="io"></span><span class="il">回看 · <b id="icnt">5</b> 颗记忆</span></div>

    <div class="wheel" id="wheel"></div>

    <div class="dial" id="dial">
      <div class="ticks"><div class="row" id="tickRow"></div><div class="mark"></div></div>
      <div class="knob"><i id="knobI"></i></div>
    </div>
    <div class="hint" id="hint">← 滑动切换 · 点击展开 →</div>

    <div class="exp" id="exp"><div class="scrim" id="expScrim"></div><div class="card" id="expCard"><button class="back" id="expBack">← 返回</button><div id="expBody"></div></div></div>
  </div>
</div>

<div class="panel">
  <div class="ti"><i></i>Stargate 记忆空间</div>
  <button class="ask" id="ask">▶ 重新绽放</button>
  <div class="ph">灵动岛绽放 → 记忆球转轮 → 点球就地展开<br><b>Hero 第一步</b> · 下一步加沉淀/留存/泊车行车</div>
</div>

<script>
const stage=document.getElementById('stage'), $=id=>document.getElementById(id);
function fit(){stage.style.transform=`scale(${Math.min(innerWidth/1300,innerHeight/812)*0.985})`;}
addEventListener('resize',fit);fit();

/* ── 星尘 ── */
(function(){const c=$('dust');const x=c.getContext('2d');let W,H,d,ps=[];
  function rs(){d=Math.min(devicePixelRatio||1,2);W=c.clientWidth;H=c.clientHeight;c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0);
    ps=[];const n=Math.round(W*H/9000);for(let i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,a:Math.random()*.5+.15,tw:Math.random()*Math.PI*2,sp:.2+Math.random()*.5,vx:(Math.random()-.5)*.06,vy:(Math.random()-.5)*.05});}
  function f(){x.clearRect(0,0,W,H);for(const p of ps){p.tw+=0.02*p.sp;p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x+=W;if(p.x>W)p.x-=W;if(p.y<0)p.y+=H;if(p.y>H)p.y-=H;const a=p.a*(0.5+0.5*Math.sin(p.tw));x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fillStyle=`rgba(200,220,255,${a})`;x.fill();}requestAnimationFrame(f);}
  rs();f();addEventListener('resize',rs);})();

/* ── 记忆球数据(四类)── */
const ORBS=[
  {type:'weather',em:'🌧',gl:'今夜天气',gs:'中雨 · 14°',tag:'🌧 过去卡片 · 6月8日',
   body:`<div class="xw x-weather"><span class="xtag">🌧 过去卡片 · 6 月 8 日</span><div class="loc">上海 · 今夜</div><div class="big">14<sup>°</sup></div><div class="sub">中雨 · 体感 12° · 降水 80% · 东风 3 级</div>
   <div class="hrs">${[['现在','16°'],['22点','13°'],['23点','12°'],['0点','11°'],['1点','11°']].map(h=>`<div class="hr"><span>${h[0]}</span><b>${h[1]}</b></div>`).join('')}</div></div>`},
  {type:'match',em:'⚽',gl:'世界杯 A 组',gs:'阿根廷领跑',tag:'⚽ 过去卡片 · 第 3 轮后',
   body:`<div class="xw x-match"><span class="xtag">⚽ 过去卡片 · A 组积分榜</span>${[['1','阿根廷','7',1],['2','法国','6',0],['3','巴西','4',0],['4','西班牙','0',0]].map(r=>`<div class="row"><span class="rk${r[3]?' top':''}">${r[0]}</span><span class="tm">${r[1]}</span><span class="pt">${r[2]}</span></div>`).join('')}</div>`},
  {type:'mem',em:'🧠',gl:'一段对话',gs:'那晚 · 很轻',tag:'🧠 对话记忆',
   body:`<div class="xw x-mem"><span class="xtag">🧠 对话总结 · 记忆</span><div class="q">「那晚你说有点累,我们没聊正事——<br>就一起听完了一首《十年》,到家。」</div><div class="meta">6 月 8 日 21:36 · 由这段对话沉淀</div></div>`},
  {type:'wall',em:'🖼',gl:'生成壁纸',gs:'极光 · 04',tag:'🖼 为你生成',img:1,
   body:`<div class="xw"><span class="xtag">🖼 为你生成的壁纸</span><div class="x-wall"><div class="ph aurora"></div><div class="cap">极光 · 04<span>根据你常去的海边,为你生成 · 点击设为车机壁纸</span></div></div></div>`},
  {type:'moment',em:'🎉',gl:'提车 100 天',gs:'一路有你',tag:'✨ 特别时刻',moment:1,
   body:`<div class="xw x-moment"><span class="xtag">✨ 特别时刻 · 为你献上</span><div class="num">100</div><div class="ttl">提车 100 天</div>
   <div class="stats"><div class="st"><b>8,240</b><span>公里</span></div><div class="st"><b>127</b><span>次出行</span></div><div class="st"><b>31</b><span>个新去处</span></div></div>
   <div class="bless">这 100 天,从清晨到深夜,<br>很高兴一路都有你。🥂</div></div>`}
];
const N=ORBS.length;
let focusF=Math.floor(N/2);   // 起始焦点
let bloomed=false;

/* 建球 */
const wheel=$('wheel'), orbEls=[];
ORBS.forEach((o,i)=>{
  const el=document.createElement('div');el.className='orb '+o.type;
  const inner=o.img
    ? `<div class="ball img"><div class="pic aurora"></div><div class="glassveil"></div></div>`
    : `<div class="ball"></div>`;
  el.innerHTML=`<div class="float"><div class="ringglow"></div><div class="ring"></div>${inner}${o.moment?'<div class="spk"></div>':''}
     <div class="glimpse"><div class="em">${o.img?'':o.em}</div><div class="gl">${o.gl}</div><div class="gs">${o.gs}</div></div></div>`;
  el.querySelector('.float').style.animationDelay=(-i*1.3)+'s';
  if(o.moment){const spk=el.querySelector('.spk');for(let k=0;k<7;k++){const s=document.createElement('i');s.style.left=(20+Math.random()*60)+'%';s.style.top=(20+Math.random()*60)+'%';s.style.animationDelay=(Math.random()*3)+'s';spk.appendChild(s);}}
  el.addEventListener('click',()=>onOrbClick(i));
  wheel.appendChild(el);orbEls.push(el);
});

/* 刻度 */
$('tickRow').innerHTML=ORBS.map((o,i)=>`<span data-i="${i}">${['天气','赛事','记忆','壁纸','时刻'][i]||'·'}</span>`).join('');
const tickSpans=[...$('tickRow').querySelectorAll('span')];

/* 转轮布局:每颗球按 (i - focusF) 的角偏移落在弧线上 */
const RX=430, RY=150, STEP=0.46, CY=24;
function render(transition){
  orbEls.forEach((el,i)=>{
    const off=i-focusF;
    const ang=off*STEP;
    const depth=Math.cos(ang);               // 1=焦点
    const x=Math.sin(ang)*RX;
    const y=(1-depth)*RY + CY;
    const s=0.46+Math.max(0,depth)*0.54;
    const op=Math.max(0, Math.min(1, (depth-0.45)/0.5));
    const blur=Math.max(0,(1-depth))*5;
    el.style.transition=transition?'transform .55s cubic-bezier(.2,.85,.25,1),opacity .55s ease,filter .55s ease':'none';
    el.style.transform=`translate(${x}px,${y}px) scale(${s.toFixed(3)})`;
    el.style.opacity=op.toFixed(2);
    el.style.filter=`blur(${blur.toFixed(1)}px)`;
    el.style.zIndex=String(100+Math.round(depth*100));
    el.classList.toggle('focus', Math.abs(off)<0.5);
    el.style.pointerEvents=op>0.15?'auto':'none';
  });
  // 刻度 + 旋钮
  const fr=Math.max(0,Math.min(N-1,focusF));
  $('tickRow').style.transform=`translate(${-fr*34 - 17}px,-50%)`;
  tickSpans.forEach((s,i)=>s.classList.toggle('on',Math.round(fr)===i));
  $('knobI').style.transform=`translateX(-50%) rotate(${focusF*32}deg)`;
}

/* 绽放 */
function bloom(){
  // 起始:所有球聚在灵动岛(顶部中心)、极小
  orbEls.forEach(el=>{el.style.transition='none';el.style.transform='translate(0,-360px) scale(.12)';el.style.opacity='0';el.style.filter='blur(6px)';});
  stage.classList.add('bloomed');bloomed=true;
  // 逐颗"沉淀"到弧线位
  requestAnimationFrame(()=>{orbEls.forEach((el,i)=>{
    const off=i-focusF, ang=off*STEP, depth=Math.cos(ang);
    const x=Math.sin(ang)*RX, y=(1-depth)*RY+CY, s=0.46+Math.max(0,depth)*0.54, op=Math.max(0,Math.min(1,(depth-0.45)/0.5)), blur=Math.max(0,(1-depth))*5;
    el.style.transition=`transform .9s cubic-bezier(.2,.9,.28,1) ${i*0.08}s, opacity .8s ease ${i*0.08}s, filter .8s ease ${i*0.08}s`;
    el.style.transform=`translate(${x}px,${y}px) scale(${s.toFixed(3)})`;el.style.opacity=op.toFixed(2);el.style.filter=`blur(${blur.toFixed(1)}px)`;
    el.style.zIndex=String(100+Math.round(depth*100));el.classList.toggle('focus',Math.abs(off)<0.5);
  });});
  setTimeout(()=>render(false),1200);   // 交回普通渲染
}
function collapse(){stage.classList.remove('bloomed');bloomed=false;}

/* 拖拽切换(软旋钮)*/
let drag=null;
wheel.addEventListener('pointerdown',e=>{if($('exp').classList.contains('show'))return;drag={x:e.clientX,f0:focusF,moved:0};wheel.setPointerCapture(e.pointerId);});
wheel.addEventListener('pointermove',e=>{if(!drag)return;const dx=e.clientX-drag.x;drag.moved=Math.max(drag.moved,Math.abs(dx));focusF=Math.max(-0.4,Math.min(N-0.6, drag.f0 - dx/240));render(false);});
function endDrag(){if(!drag)return;const wasDrag=drag.moved>6;drag=null;snapTo(Math.round(focusF));return wasDrag;}
wheel.addEventListener('pointerup',endDrag);wheel.addEventListener('pointercancel',endDrag);

let snapRAF=null;
function snapTo(target){target=Math.max(0,Math.min(N-1,target));cancelAnimationFrame(snapRAF);
  const start=focusF, t0=performance.now(), dur=460;
  (function step(now){const p=Math.min(1,(now-t0)/dur);const e=1-Math.pow(1-p,3);focusF=start+(target-start)*e;render(false);if(p<1)snapRAF=requestAnimationFrame(step);})(performance.now());}

function onOrbClick(i){
  if(drag&&drag.moved>6)return;
  if(Math.abs(i-focusF)<0.5){ openExp(i); }   // 点焦点球 → 展开
  else { snapTo(i); }                          // 点侧球 → 转到焦点
}

/* 就地展开 */
function openExp(i){const o=ORBS[i];$('expBody').innerHTML=o.body;$('exp').classList.add('show');stage.classList.add('detail');}
function closeExp(){$('exp').classList.remove('show');stage.classList.remove('detail');}
$('expBack').onclick=closeExp;$('expScrim').onclick=closeExp;
$('island').onclick=()=>{if(!bloomed)bloom();};

function play(){closeExp();focusF=Math.floor(N/2);collapse();render(false);setTimeout(bloom,700);}
$('ask').onclick=play;
play();
</script>
</body>
</html>
