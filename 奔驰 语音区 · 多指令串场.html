<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="robots" content="noindex,nofollow"/>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>奔驰 · 语音区 · 多指令串场</title>
<!--
  一长串指令一次说完 → 系统逐条执行:闲聊 → 车控空调 → 天气(真实雨/湿玻璃)→ 音乐(真实音乐小窗)→ 世界杯积分榜 → 复杂多目的地导航(完全复刻深度思考:全屏暗图+扎点落在地图坐标+路线生长+镜头跟随+思考胶囊+行程)。
  音乐仅显示歌名/歌手元数据,不含歌词;积分榜为示例数据。
-->
<style>
  :root{--card:rgba(20,26,38,.7);--card-bd:rgba(255,255,255,.1);--ink:#eef1f4;--ink-soft:rgba(238,241,244,.62);--soft:rgba(238,241,244,.62);--faint:rgba(238,241,244,.4);--gold:#ffcf6a;--green:#34d06a;--route:#3ee07a;--route-glow:rgba(62,224,122,.5);--vz-w:432px;--tc:#d29270}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#05070b;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}
  .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .stage{position:relative;width:1300px;height:812px;overflow:hidden;transform-origin:center center;border-radius:18px;box-shadow:0 40px 120px rgba(0,0,0,.65);background:#0e1420}
  .map{position:absolute;inset:0;z-index:0}.world{position:absolute;inset:0;transform-origin:0 0;will-change:transform}.world svg{position:absolute;inset:0;width:100%;height:100%}
  #traveled{fill:none;pointer-events:none}
  #route path{fill:none;stroke:var(--route);stroke-width:7;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 6px var(--route-glow))}
  .map-scrim{position:absolute;inset:0;z-index:1;background:radial-gradient(125% 105% at 50% 40%,rgba(8,11,18,.52),rgba(6,9,15,.78));transition:opacity .6s}
  .stage.nav-active .map-scrim{opacity:.32}

  .statusbar{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:55}
  .sb-left{display:flex;align-items:center;gap:13px;flex:1;min-width:0;height:100%;padding-right:24px}
  .avatar{width:36px;height:36px;border-radius:50%;flex:none;position:relative;background-image:linear-gradient(135deg,#f3c9b0,#cf9d86);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.4);transition:box-shadow .5s}
  .avatar::before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#5b8cff,#9b6bff,#ff6b9b,#ffab5b,#5bd6ff,#5b8cff);filter:blur(1px);opacity:0;transition:opacity .55s;animation:spin 5s linear infinite}
  .avatar::after{content:"";position:absolute;inset:7px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff,rgba(255,255,255,.6));box-shadow:0 0 14px rgba(255,255,255,.55);opacity:0;transition:opacity .55s}
  .avatar.awake{box-shadow:none;animation:breathe 3.2s ease-in-out infinite}.avatar.awake::before,.avatar.awake::after{opacity:1}
  .avatar.thinking{animation:think-breathe 1.25s ease-in-out infinite}.avatar.thinking::before{animation-duration:1.5s}
  @keyframes think-breathe{0%,100%{box-shadow:0 0 14px 2px rgba(120,140,255,.5)}50%{box-shadow:0 0 24px 7px rgba(150,110,255,.82)}}
  @keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .sb-voice{position:relative;display:flex;align-items:center;min-width:0;height:100%}
  .sv-asr{display:inline-flex;align-items:center;max-width:660px;overflow:hidden;white-space:nowrap;font-size:15.5px;font-weight:600;color:var(--ink);opacity:0;transition:opacity .35s,transform .4s,filter .4s}
  .sv-asr.show{opacity:1}.sv-asr.done{color:#62e08c}.sv-asr.gone{opacity:0;transform:translateY(-7px);filter:blur(2px)}
  .sv-cur{display:inline-block;width:2px;height:16px;background:#62e08c;margin-left:2px;animation:blink 1s step-end infinite}@keyframes blink{50%{opacity:0}}
  .sv-reply{font-size:15.5px;font-weight:600;color:#fff;white-space:nowrap;opacity:0;transform:translateY(4px);transition:opacity .45s,transform .45s;text-shadow:0 1px 12px rgba(0,0,0,.5)}.sv-reply.show{opacity:1;transform:none}
  .exec-chip{margin-left:12px;flex:none;font-size:12px;font-weight:700;color:#cfe0ff;background:rgba(91,140,255,.18);box-shadow:inset 0 0 0 1px rgba(91,140,255,.3);padding:3px 11px;border-radius:20px;opacity:0;transform:translateY(-3px);transition:.3s}.exec-chip.show{opacity:1;transform:none}
  .sb-right{display:flex;align-items:center;gap:16px;color:#dfe3e8;flex:none}.sb-clock{font-size:19px;font-weight:500}.sb-5g{font-size:10px;font-weight:700;vertical-align:top}

  /* 桌面家具(导航识别后整体淡出) */
  .home{transition:opacity .5s}.stage.nav-active .home{opacity:0;pointer-events:none}.mapcard{display:none}
  .mapcard{position:absolute;top:64px;left:40px;width:300px;border-radius:20px;background:rgba(44,52,64,.5);backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);box-shadow:0 8px 30px rgba(0,0,0,.3),inset 0 0 0 1px rgba(255,255,255,.12);overflow:hidden;z-index:25;color:#fff;transition:transform .42s cubic-bezier(.2,.7,.2,1)}
  .stage.voice-on .mapcard{transform:translateX(calc(var(--vz-w) + 16px))}
  .mc-top{display:flex;align-items:center;gap:9px;padding:14px 16px}.mc-top .t{flex:1;font-size:16px;font-weight:500}
  .mc-quick{display:flex;background:rgba(10,14,20,.4)}.mc-quick div{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 0;opacity:.85}.mc-quick div+div{box-shadow:inset 1px 0 0 rgba(255,255,255,.08)}
  .weather{position:absolute;top:60px;right:36px;text-align:right;z-index:25}.weather .temp{font-size:60px;font-weight:200;line-height:.9;letter-spacing:-1px;color:#fff}.weather .temp sup{font-size:20px;font-weight:300;vertical-align:top;margin-left:2px}.weather .loc{font-size:15px;color:var(--soft);margin-top:6px}
  .cards{position:absolute;left:40px;right:40px;bottom:84px;display:flex;gap:16px;z-index:15}
  .card{flex:1;height:96px;border-radius:18px;background:rgba(24,30,40,.6);backdrop-filter:blur(20px) saturate(1.2);box-shadow:0 8px 26px rgba(0,0,0,.25),inset 0 0 0 1px rgba(255,255,255,.1);display:flex;align-items:center;gap:13px;padding:0 18px;color:#eef1f4}
  .card .ic{width:42px;height:42px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.08)}
  .card .big{font-size:18px;font-weight:600}.card .sub{font-size:12px;color:var(--soft);margin-top:3px}.card .lnk{color:#7fa8ff;font-weight:600}
  .card .col2{display:flex;gap:18px;width:100%}.tyre{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--soft);width:100%}.tyre .r{display:flex;justify-content:space-between}.tyre .tcar{align-self:center;width:26px;height:14px;border-radius:5px;background:rgba(255,255,255,.16);margin:1px 0}

  /* 地图扎点(屏幕层,落在地图真实坐标) */
  .pin{position:absolute;z-index:20;transform:translate(-50%,-100%);opacity:0;pointer-events:none}
  .pin.show{animation:drop .6s cubic-bezier(.2,1.1,.35,1) forwards}
  @keyframes drop{0%{opacity:0;transform:translate(-50%,-150%) scale(.6)}60%{opacity:1;transform:translate(-50%,-94%) scale(1.05)}100%{opacity:1;transform:translate(-50%,-100%) scale(1)}}
  .pin .body{position:relative;width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:linear-gradient(135deg,#3ee07a,#23b85e);box-shadow:0 6px 16px rgba(0,0,0,.5),0 0 0 2px rgba(255,255,255,.18)}
  .pin .body span{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;transform:rotate(45deg);font-size:16px;font-weight:800;color:#0c2a16}
  .pin.start .body{background:linear-gradient(135deg,#56a0ff,#2f6bff)}.pin.start .body span{color:#fff;font-size:13px}
  .pin .label{position:absolute;left:50%;top:-30px;transform:translateX(-50%);white-space:nowrap;background:rgba(20,26,34,.9);color:#fff;font-size:12.5px;font-weight:600;padding:4px 10px;border-radius:9px;box-shadow:0 4px 12px rgba(0,0,0,.4)}
  .pin .ripple{position:absolute;left:50%;bottom:-3px;width:14px;height:5px;border-radius:50%;transform:translateX(-50%);background:rgba(52,208,110,.5)}
  .pin.show .ripple{animation:rip .6s ease-out .12s both}@keyframes rip{0%{transform:translateX(-50%) scale(.3);opacity:.8}100%{transform:translateX(-50%) scale(2.6);opacity:0}}
  .pin.start .ripple{background:rgba(86,160,255,.5)}

  /* ── 语音区 ── */
  .voice-zone{position:absolute;left:40px;top:64px;z-index:50;width:var(--vz-w);display:flex;flex-direction:column;gap:14px}
  #vz{display:flex;flex-direction:column;gap:14px}
  /* 迷你卡(空调/积分榜) */
  .mini{opacity:0;transform:translateY(-8px) scale(.985);transition:opacity .42s,transform .42s;background:var(--card);backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);border-radius:18px;box-shadow:0 14px 40px rgba(0,0,0,.42),inset 0 0 0 1px var(--card-bd);padding:16px 18px;color:#fff}
  .mini.in{opacity:1;transform:none}.mini.out{opacity:0;transform:translateY(-10px) scale(.97)}
  .row{display:flex;align-items:center;gap:14px}.m-ic{width:46px;height:46px;border-radius:13px;flex:none;display:flex;align-items:center;justify-content:center;font-size:22px}
  .m-t{font-size:17px;font-weight:700}.m-s{font-size:12px;color:var(--soft);margin-top:3px}.m-big{margin-left:auto;font-size:30px;font-weight:300;line-height:1}.m-big span{font-size:15px;color:var(--soft);margin-left:2px}
  .tbl-h{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}.tbl-head{display:flex;font-size:10px;color:var(--faint);padding:0 0 6px}
  .tbl-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px}.tbl-row+.tbl-row{border-top:1px solid rgba(255,255,255,.07)}
  .tbl-row .rk{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex:none;background:rgba(255,255,255,.08)}.tbl-row .rk.top{background:var(--gold);color:#0b0a14}
  .tbl-row .tm{flex:1;font-weight:600}.tbl-row .rec{width:62px;text-align:center;color:var(--soft);font-size:11.5px;font-variant-numeric:tabular-nums}.tbl-row .pt{width:34px;text-align:right;font-weight:800;font-size:16px}

  /* 天气:真实雨/湿玻璃卡 */
  .wcard{position:relative;width:100%;border-radius:22px;overflow:hidden;opacity:0;transform:translateY(-8px) scale(.985);transition:opacity .45s,transform .45s,background .6s,backdrop-filter .6s;background:linear-gradient(165deg,rgba(46,62,84,.5),rgba(64,80,102,.4));backdrop-filter:blur(18px) saturate(1.15) brightness(1.02);-webkit-backdrop-filter:blur(18px) saturate(1.15) brightness(1.02);box-shadow:0 18px 50px rgba(20,30,45,.4),inset 0 1px 0 rgba(255,255,255,.4),inset 0 0 0 1px rgba(255,255,255,.14)}
  .wcard.in{opacity:1;transform:none}.wcard.out{opacity:0;transform:translateY(-10px) scale(.97)}
  .wcard.wet{background:linear-gradient(165deg,rgba(30,42,60,.66),rgba(44,58,80,.56));backdrop-filter:blur(24px) saturate(1.1) brightness(.86);-webkit-backdrop-filter:blur(24px) saturate(1.1) brightness(.86)}
  .wcard canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.wcard .rain{z-index:3}.wcard .spec{z-index:2}
  .wc-content{position:relative;z-index:4;padding:18px 20px 16px;color:#fff}.wc-head{display:flex;align-items:center;justify-content:space-between}
  .wc-loc{font-size:15px;font-weight:600;opacity:.95}.wc-cond{font-size:13px;font-weight:500;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.18);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
  .wc-temp{font-size:64px;font-weight:200;line-height:.95;margin:6px 0 2px;text-shadow:0 2px 24px rgba(0,0,0,.25)}.wc-temp sup{font-size:24px;font-weight:300;vertical-align:top}.wc-sub{font-size:13px;opacity:.82}
  .wc-hours{display:flex;justify-content:space-between;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.16)}
  .hr{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}.hr .h{font-size:11px;opacity:.7}.hr .v{font-size:13px;font-weight:600}.hr .pp{width:100%;height:3px;border-radius:2px;background:rgba(255,255,255,.18);overflow:hidden}.hr .pp i{display:block;height:100%;background:#8fc6ff;border-radius:2px}

  /* 音乐:真实音乐小窗 */
  .music{position:relative;border-radius:22px;overflow:hidden;color:#fff;opacity:0;transform:translateY(-8px) scale(.985);transition:opacity .45s,transform .45s;box-shadow:0 18px 50px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.12)}
  .music.in{opacity:1;transform:none}.music.out{opacity:0;transform:translateY(-10px) scale(.97)}
  .m-bg{position:absolute;inset:0;background:center/cover no-repeat;filter:blur(36px) saturate(1.5);transform:scale(1.5);opacity:.55}
  .m-scrim2{position:absolute;inset:0;background:linear-gradient(180deg,rgba(12,15,22,.5),rgba(10,13,19,.82)),radial-gradient(120% 80% at 50% 18%,color-mix(in srgb,var(--tc) 42%,transparent),transparent 70%)}
  .m-in{position:relative;padding:13px 20px 16px}.m-top{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);margin-bottom:6px}.m-top .dot{width:6px;height:6px;border-radius:50%;background:var(--tc);box-shadow:0 0 8px var(--tc)}
  .disc-wrap{display:flex;justify-content:center;padding:2px 0 10px;animation:breath 4s ease-in-out infinite}@keyframes breath{0%,100%{transform:scale(1)}50%{transform:scale(1.022)}}
  .disc{width:128px;height:128px;border-radius:50%;position:relative;background:repeating-radial-gradient(circle at center,#191919 0 2px,#0e0e0e 2px 4px);box-shadow:0 12px 30px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.06);animation:spin 14s linear infinite}
  .disc::after{content:"";position:absolute;inset:46%;border-radius:50%;background:#05060a;box-shadow:0 0 0 3px rgba(255,255,255,.12)}.disc img{position:absolute;inset:24%;width:52%;height:52%;border-radius:50%;object-fit:cover;box-shadow:0 0 0 5px #07080c}
  .m-meta{text-align:center;margin-bottom:10px}.m-title{font-size:20px;font-weight:800}.m-artist{font-size:12.5px;color:rgba(255,255,255,.66);margin-top:3px}
  .m-prog{margin-bottom:11px}.m-bar{height:4px;border-radius:3px;background:rgba(255,255,255,.18);position:relative}.m-bar .fill{position:absolute;left:0;top:0;bottom:0;width:27%;border-radius:3px;background:var(--tc)}.m-bar .knob{position:absolute;left:27%;top:50%;width:11px;height:11px;border-radius:50%;background:#fff;transform:translate(-50%,-50%);box-shadow:0 1px 5px rgba(0,0,0,.5)}
  .m-times{display:flex;justify-content:space-between;font-size:10.5px;color:rgba(255,255,255,.55);margin-top:6px}
  .m-ctrl{display:flex;align-items:center;justify-content:space-between;padding:0 4px}.m-ctrl .ico{width:23px;height:23px;color:rgba(255,255,255,.85)}.m-ctrl .ico.sm{width:20px;height:20px;opacity:.72}.m-ctrl .play{width:50px;height:50px;border-radius:50%;background:var(--tc);color:#0a0a0a;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px color-mix(in srgb,var(--tc) 55%,transparent)}.m-ctrl .play .ico{width:24px;height:24px}

  /* 复杂导航:思考胶囊 + 行程(完全复刻深度思考) */
  .think{display:none;flex-direction:column;gap:10px;width:100%}.think.show{display:flex;animation:thinkin .42s ease}@keyframes thinkin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .think-pill{display:flex;align-items:center;gap:13px;padding:11px 15px;background:rgba(18,24,34,.85);backdrop-filter:blur(22px);border-radius:20px;box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 0 0 1px rgba(125,140,255,.32)}
  .think-pill .spinner{width:22px;height:22px;border-radius:50%;flex:none;background:conic-gradient(from 0deg,rgba(125,140,255,0),#7d8cff,#b58cff,rgba(125,140,255,0));-webkit-mask:radial-gradient(circle 6.5px at center,transparent 98%,#000);mask:radial-gradient(circle 6.5px at center,transparent 98%,#000);animation:spin 1s linear infinite}
  .think-pill .now{flex:1;min-width:0;overflow:hidden}.think-pill .l1{font-size:14.5px;font-weight:700;color:#eaecff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.think-pill .l2{font-size:11.5px;color:rgba(180,188,220,.72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}.think-pill .chev{font-size:13px;color:rgba(180,188,220,.7);transition:transform .3s;flex:none}.think.expanded .think-pill .chev{transform:rotate(180deg)}
  .think-panel{max-height:0;opacity:0;overflow:hidden;transition:max-height .42s cubic-bezier(.2,.8,.2,1),opacity .35s;background:rgba(16,22,32,.9);backdrop-filter:blur(24px);border-radius:18px;box-shadow:0 18px 50px rgba(0,0,0,.5),inset 0 0 0 1px rgba(125,140,255,.25)}.think.expanded .think-panel{max-height:340px;opacity:1}
  .tp-head{display:flex;align-items:center;gap:9px;padding:14px 18px 9px;font-size:14px;font-weight:700;color:#fff}.tp-orb{width:16px;height:16px;border-radius:50%;background:conic-gradient(from 0deg,#7d8cff,#b58cff,#ff8cd0,#7d8cff);animation:spin 3s linear infinite}.tp-tag{margin-left:auto;font-size:10px;font-weight:700;color:#bda6ff;background:rgba(150,120,255,.18);padding:2px 8px;border-radius:6px}
  .tp-list{padding:2px 18px 14px}.tp-row{display:flex;align-items:center;gap:12px;padding:7px 0;font-size:13.5px;transition:color .3s}.tp-row+.tp-row{border-top:1px solid rgba(255,255,255,.05)}
  .tp-row .ic{width:18px;height:18px;border-radius:50%;flex:none;position:relative}.tp-row.todo{color:rgba(180,188,220,.5)}.tp-row.todo .ic{box-shadow:inset 0 0 0 1.5px rgba(180,188,220,.3)}
  .tp-row.active{color:#fff;font-weight:600}.tp-row.active .ic{box-shadow:inset 0 0 0 2px #8c8cff}.tp-row.active .ic::after{content:"";position:absolute;inset:4px;border-radius:50%;background:#9c8cff}
  .tp-row.done{color:rgba(155,172,210,.9)}.tp-row.done .ic{background:#34d06a}.tp-row.done .ic::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#06210f}
  .trip{position:relative;margin-left:7px;padding-left:30px}.trip-line{position:absolute;left:0;top:14px;width:2px;background:linear-gradient(180deg,#56a0ff,var(--route));height:0;transition:height .5s ease}
  .stop{position:relative;opacity:0;transform:translateX(-10px);transition:opacity .45s,transform .45s;margin-bottom:12px}.stop.in{opacity:1;transform:none}
  .stop .node{position:absolute;left:-30px;top:14px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0c2a16;background:linear-gradient(135deg,#3ee07a,#23b85e);box-shadow:0 0 0 4px rgba(52,208,110,.16)}.stop.s0 .node{background:linear-gradient(135deg,#56a0ff,#2f6bff);color:#fff}
  .stop .strow{background:var(--card);backdrop-filter:blur(20px);border-radius:15px;box-shadow:inset 0 0 0 1px var(--card-bd);padding:12px 15px;display:flex;align-items:center;gap:13px}
  .stop .em{width:40px;height:40px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(255,255,255,.08)}.stop .name{font-size:16px;font-weight:600}.stop .meta{font-size:12.5px;color:var(--soft);margin-top:3px}.stop .eta{margin-left:auto;text-align:right;font-size:12px;color:var(--soft);white-space:nowrap}.stop .eta b{display:block;font-size:14px;font-weight:700;color:#9fd9b4}
  .tag{display:inline-block;font-size:11px;font-weight:600;color:#9fd9b4;background:rgba(52,208,110,.14);padding:1px 7px;border-radius:6px;margin-left:6px;vertical-align:1px}.s0 .tag{color:#9fc2ff;background:rgba(86,160,255,.16)}
  .go{display:flex;align-items:center;gap:14px;margin-top:2px;opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}.go.show{opacity:1;transform:none}
  .go-sum{font-size:12.5px;color:var(--soft);line-height:1.5}.go-sum b{color:var(--ink);font-size:14px}

<script>
(function(){
  var KEY='aios_demo_unlock_v1';
  var HASH='cc35f579797e106bb3ea97001fc565e8eb7d6b0a385920f2fc6721ddcc606d59';
  function ok(){try{return localStorage.getItem(KEY)===HASH;}catch(e){return false;}}
  if(ok())return;
  function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){return Array.prototype.map.call(new Uint8Array(b),function(x){return ('0'+x.toString(16)).slice(-2);}).join('');});}
  function build(){
    if(document.getElementById('__aiosgate'))return;
    var ov=document.createElement('div');
    ov.id='__aiosgate';
    ov.innerHTML='<div class="gcard"><div class="gorb"></div><div class="gt">AIOS Dynamic Window</div><div class="gs">Mercedes-Benz · MVA — Private preview</div><input class="gin" id="__gp" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter password"><button class="gb" id="__gb">Unlock</button><div class="ge" id="__ge">Incorrect password</div><div class="gf">Authorized access only</div></div>';
    (document.body||document.documentElement).appendChild(ov);
    var inp=document.getElementById('__gp'),btn=document.getElementById('__gb'),err=document.getElementById('__ge'),card=ov.querySelector('.gcard'),busy=false;
    function go(){
      if(busy)return;busy=true;
      sha(inp.value||'').then(function(h){
        busy=false;
        if(h===HASH){try{localStorage.setItem(KEY,HASH);}catch(e){}ov.style.transition='opacity .4s ease';ov.style.opacity='0';setTimeout(function(){if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);},420);}

    }
    btn.addEventListener('click',go);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')go();else err.style.opacity='0';});
    setTimeout(function(){try{inp.focus();}catch(e){}},120);
  }
  if(document.documentElement)build();else document.addEventListener('DOMContentLoaded',build);
})();
</script>

function makeRain(c){const x=c.getContext('2d');let W,H,d,drops=[],I=0;function resize(){d=Math.min(devicePixelRatio||1,1.5);W=c.clientWidth;H=c.clientHeight;c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0);}function frame(){x.clearRect(0,0,W,H);if(W<2)return;const n=Math.round(I*3.2);for(let i=0;i<n;i++)drops.push({x:Math.random()*W*1.12-W*.06,y:-18,len:7+Math.random()*12*I,sp:2.2+Math.random()*2.4,a:.07+Math.random()*.18,w:.6+Math.random()*.9});x.lineCap='round';for(const p of drops){x.strokeStyle=`rgba(206,224,238,${p.a})`;x.lineWidth=p.w;x.beginPath();x.moveTo(p.x,p.y);x.lineTo(p.x-1.5,p.y-p.len);x.stroke();p.y+=p.sp;p.x-=.28;}drops=drops.filter(p=>p.y<H+p.len);}return{resize,frame,set i(v){I=v},get i(){return I}};}
function makeWet(c){const s=c.getContext('2d');let W,H,d,statics=[],sliders=[],w=0;function resize(){d=Math.min(devicePixelRatio||1,1.6);W=c.clientWidth;H=c.clientHeight;c.width=W*d;c.height=H*d;s.setTransform(d,0,0,d,0,0);seed();}function seed(){statics=[];const n=Math.min(120,Math.max(0,Math.round(W*H/2900)));for(let i=0;i<n;i++){const b=Math.random();statics.push({x:Math.random()*W,y:Math.random()*H,r:1.4+Math.pow(b,2.1)*7.5,t:Math.random()*.6,fx:Math.random(),fy:Math.random()});}}function lens(o,a){const r=o.r;s.save();s.beginPath();s.arc(o.x,o.y,r*.9,0,7);s.clip();if(heroOK){const sw=heroImg.width*.085,sh=heroImg.height*.12,ix=heroImg.width*(.16+o.fx*.62),iy=heroImg.height*(.24+o.fy*.5);s.globalAlpha=a;s.translate(o.x,o.y);s.scale(1,-1);s.drawImage(heroImg,ix-sw/2,iy-sh/2,sw,sh,-r,-r,r*2,r*2);s.setTransform(d,0,0,d,0,0);s.globalAlpha=1;}else{s.fillStyle=`rgba(206,220,236,${.5*a})`;s.fillRect(o.x-r,o.y-r,r*2,r*2);}s.restore();}function drawDrop(o,a){const r=o.r,x=o.x,y=o.y;s.fillStyle=`rgba(8,14,24,${.24*a})`;s.beginPath();s.ellipse(x+r*.12,y+r*.5,r*.92,r*.82,0,0,7);s.fill();lens(o,a);const g=s.createRadialGradient(x,y+r*.34,r*.05,x,y,r);g.addColorStop(0,`rgba(255,255,255,${.12*a})`);g.addColorStop(.6,'rgba(255,255,255,0)');g.addColorStop(1,`rgba(5,11,20,${.24*a})`);s.fillStyle=g;s.beginPath();s.arc(x,y,r*.9,0,7);s.fill();s.lineWidth=Math.max(.7,r*.14);s.strokeStyle=`rgba(255,255,255,${.5*a})`;s.beginPath();s.arc(x,y,r*.82,Math.PI*1.04,Math.PI*2.12);s.stroke();s.fillStyle=`rgba(255,255,255,${.92*a})`;s.beginPath();s.arc(x-r*.3,y-r*.34,Math.max(.6,r*.2),0,7);s.fill();}function frame(){s.clearRect(0,0,W,H);if(w<=.01)return;if(Math.random()<.009*w&&sliders.length<2)sliders.push({x:12+Math.random()*(W-24),y:Math.random()*H*.22,r:6.5+Math.random()*5,v:.1,fx:Math.random(),fy:Math.random()});for(const dd of sliders){dd.v=Math.min(dd.v+.009,.6+dd.r*.035);dd.y+=dd.v;if(Math.random()<.08&&statics.length<170)statics.push({x:dd.x+(Math.random()-.5)*dd.r*2.2,y:dd.y-dd.r,r:1+Math.random()*2,t:0,fx:dd.fx,fy:dd.fy});}sliders=sliders.filter(dd=>dd.y<H+14);for(const st of statics){const a=st.t?Math.max(0,Math.min(1,(w-st.t)/.25)):w;if(a>.01)drawDrop(st,a);}for(const dd of sliders)drawDrop(dd,w);}return{resize,frame,set w(v){w=v;},get w(){return w;}};}
let rainMod=null,wetMod=null,rainRAF=null,rainWetT=null,rS={rI:0,wW:0,rt:0,wt:0};
function startRain(){const cr=$('crain'),cs=$('cspec');if(!cr||!cs)return;rainMod=makeRain(cr);wetMod=makeWet(cs);rainMod.resize();wetMod.resize();rS={rI:0,wW:0,rt:1,wt:0};let last=performance.now();const loop=(now)=>{last=now;rS.rI+=(rS.rt-rS.rI)*.06;rS.wW+=(rS.wt-rS.wW)*.03;rainMod.i=Math.max(0,rS.rI);wetMod.w=Math.max(0,rS.wW);rainMod.frame();wetMod.frame();rainRAF=requestAnimationFrame(loop);};rainRAF=requestAnimationFrame(loop);rainWetT=setTimeout(()=>{rS.wt=1;const wc=document.querySelector('.wcard');if(wc)wc.classList.add('wet');},1400);}

function fitCam(pts,R,a,maxS){const xs=pts.map(p=>p.x),ys=pts.map(p=>p.y),pad=72;const minX=Math.min(...xs)-pad,maxX=Math.max(...xs)+pad,minY=Math.min(...ys)-pad,maxY=Math.max(...ys)+pad;const bw=Math.max(maxX-minX,140),bh=Math.max(maxY-minY,140);let s=Math.min((R.x1-R.x0)/bw,(R.y1-R.y0)/bh);s=Math.max(.9,Math.min(maxS||1.7,s));const cx=(minX+maxX)/2,cy=(minY+maxY)/2;applyCam(s,(R.x0+R.x1)/2-s*cx,(R.y0+R.y1)/2-s*cy,a);}

const MAX_STACK=5;let history=[],generating=false,activeCmd=null;
const hstack=$('hstack'),activeBox=$('active'),hlock=$('hlock'),hcount=$('hcount');
function renderStack(animateNew){
  const vis=history.slice(-MAX_STACK);hstack.innerHTML='';
  vis.forEach((cmd,idx)=>{
    const depth=vis.length-1-idx;const d=document.createElement('div');d.className='hcard';
    d.style.zIndex=String(idx+1);d.style.opacity=(1-depth*0.13).toFixed(2);
    if(!(animateNew&&idx===vis.length-1))d.style.animation='none';
    d.innerHTML=`<span class="hc-ic">${cmd.icon}</span><span class="hc-tx"><span class="hc-t">${cmd.title}</span><span class="hc-s">${cmd.summary}</span></span><span class="hc-exp">⤢</span>`;
    d.onclick=()=>{if(generating){bumpLocked();return;}enterSpace(cmd.orb);};   // 点叠放卡 → 绽放进星河,直达该球
    hstack.appendChild(d);
  });
  const total=3+history.length;hcount.className='hcount sg-on';hcount.innerHTML=`<span class="io"></span><span class="il">星河 · <b>${total}</b> 段沉淀</span><span class="iarrow">›</span>`;hcount.onclick=()=>{if(generating){bumpLocked();return;}enterSpace();};
  hstack.classList.toggle('locked',generating);
}
function setGen(on){generating=on;hstack.classList.toggle('locked',on);$('vz').classList.toggle('gen',on);hlock.style.display=(on&&history.length)?'flex':'none';}
function collapseToStack(){
  if(!activeCmd)return;
  if(activeCmd.onHide)activeCmd.onHide();
  history.push(activeCmd);activeCmd=null;
  sedimentFly(activeBox.firstElementChild);   // 结果卡克隆成浮层「沉淀」飞进星河胶囊
  activeBox.innerHTML='';                        // 同步清空,下一步(生成/导航)内容才不会被覆盖
  renderStack(true);
}
function sedimentFly(card){
  if(!card)return;
  try{
    const sc=Math.min(innerWidth/1300,innerHeight/812)*0.985;
    const cr=card.getBoundingClientRect(),sr=stage.getBoundingClientRect(),pr=hcount.getBoundingClientRect();
    const x0=(cr.left-sr.left)/sc,y0=(cr.top-sr.top)/sc,w=cr.width/sc;
    const px=(pr.left-sr.left)/sc+18,py=(pr.top-sr.top)/sc+8;
    const fly=card.cloneNode(true);
    fly.style.cssText='position:absolute;left:'+x0+'px;top:'+y0+'px;width:'+w+'px;margin:0;z-index:70;pointer-events:none;transition:transform .55s cubic-bezier(.4,0,.25,1),opacity .5s ease,filter .5s ease';
    stage.appendChild(fly);
    requestAnimationFrame(()=>{fly.style.transform='translate('+(px-x0)+'px,'+(py-y0)+'px) scale(.16)';fly.style.opacity='0';fly.style.filter='blur(3px)';});
    setTimeout(()=>{if(fly.parentNode)fly.parentNode.removeChild(fly);},600);
  }catch(e){}
}

const vzEl=$('vz');
function traceOpen(cmd){$('vdTitle').textContent=cmd.title;$('vdBody').innerHTML=cmd.html;vzEl.classList.add('detail-open');$('phlabel').textContent='回溯 · '+cmd.title+' · 完整替换语音区';}
function traceClose(silent){vzEl.classList.remove('detail-open');if(!silent)$('phlabel').textContent='历史可回溯 · 串场结束';}
$('vdBack').onclick=()=>traceClose();
function startGen(cmd,i){
  setGen(true);$('avatar').classList.add('awake','thinking');stage.classList.add('voice-on');$('svReply').classList.remove('show');exec(i+1,3,cmd.name);
  activeBox.innerHTML=`<div class="think-pill"><div class="spinner"></div><div class="now"><div class="l1">正在生成 · ${cmd.title}</div><div class="l2">${cmd.ask}</div></div></div>`;
}
function revealCard(cmd){
  activeBox.innerHTML=cmd.html;const c=activeBox.firstElementChild;requestAnimationFrame(()=>c&&c.classList.add('in'));
  if(cmd.onShow)cmd.onShow();$('avatar').classList.remove('thinking');reply(cmd.reply);activeCmd=cmd;setGen(false);
}
const GEN=950,HOLD=1450;
function scheduleGen(t0,cmd,i){at(t0,()=>{collapseToStack();startGen(cmd,i);});at(t0+GEN,()=>revealCard(cmd));return t0+GEN+HOLD;}

/* ⑥ 复杂导航(完全复刻深度思考) */
const THINK_STEPS=['理解多目的地出行指令','识别「华润万家」「学校」位置','计算最优途经顺序','避开晚高峰拥堵','规划路线与耗时','生成行程'];
function stopHTML(p,i){return `<div class="node">${p.start?'起':i}</div><div class="strow"><div class="em">${p.start?'📍':p.em}</div><div><div class="name">${p.name}${p.tag?`<span class="tag">${p.tag}</span>`:''}</div><div class="meta">${p.meta||'出发点'}</div></div>${p.km?`<div class="eta"><b>${p.eta}</b>${p.km}</div>`:''}</div>`;}
function navStage(t0){
  at(t0,()=>{collapseToStack();setGen(true);$('svReply').classList.remove('show');exec(3,3,'多目的地导航');$('avatar').classList.add('awake','thinking');stage.classList.add('nav-active');reply('好的,这就为你规划顺路的多目的地路线');
    $('active').innerHTML=`<div class="think show expanded" id="think"><div class="think-pill"><div class="spinner"></div><div class="now"><div class="l1" id="thinkNow">理解多目的地指令</div><div class="l2" id="thinkNext">下一步 · …</div></div><div class="chev">⌃</div></div><div class="think-panel"><div class="tp-head"><span class="tp-orb"></span>MVA 思考过程<span class="tp-tag">深度思考</span></div><div class="tp-list" id="tpList"></div></div></div><div class="trip" id="trip"><div class="trip-line" id="tripLine"></div></div><div class="go" id="go"><div class="go-sum">为你规划 <b>3 个目的地</b><br>全程 21.4 公里 · 约 1 小时</div><button class="go-btn">开始导航</button></div>`;
    $('tpList').innerHTML=THINK_STEPS.map((s,i)=>`<div class="tp-row todo" id="tpr${i}"><span class="ic"></span><span>${s}</span></div>`).join('');});
  // 思考步骤
  const TS=t0+700,SM=820;
  THINK_STEPS.forEach((s,i)=>at(TS+i*SM,()=>{const now=$('thinkNow');if(now)now.textContent=s;const nx=$('thinkNext');if(nx)nx.textContent=i<THINK_STEPS.length-1?'下一步 · '+THINK_STEPS[i+1]:'即将生成结果';THINK_STEPS.forEach((q,k)=>{const r=$('tpr'+k);if(r)r.className='tp-row '+(k<i?'done':k===i?'active':'todo');});$('phlabel').textContent=`思考 ${i+1}/${THINK_STEPS.length}`;}));
  const P0=TS+THINK_STEPS.length*SM;
  at(P0,()=>{$('avatar').classList.remove('thinking');THINK_STEPS.forEach((q,k)=>{const r=$('tpr'+k);if(r)r.className='tp-row done';});const now=$('thinkNow');if(now)now.textContent='已完成思考 · 规划路线';const th=$('think');if(th)th.classList.remove('expanded');});
  // 起点扎点 + 镜头
  const shown=[PTS[0]];
  at(P0+550,()=>{$('phlabel').textContent='规划路线';$('pin0').classList.add('show');fitCam(shown,PLAN_R,true,1.55);});
  // 逐站:扎点落地图 + 行程生长 + 路线段生长 + 镜头跟随
  const base=P0+1150,gap=1200;
  PTS.forEach((p,i)=>{if(i===0)return;at(base+(i-1)*gap,()=>{
    $('phlabel').textContent=`扎点 ${i}/3`;
    const trip=$('trip'),line=$('tripLine');const sd=document.createElement('div');sd.className='stop s'+i;sd.innerHTML=stopHTML(p,i);trip.appendChild(sd);
    requestAnimationFrame(()=>{sd.classList.add('in');if(line)line.style.height=(trip.scrollHeight-28)+'px';});
    $('pin'+i).classList.add('show');const sp=seg(PTS[i-1],PTS[i]);requestAnimationFrame(()=>{sp.getBoundingClientRect();sp.style.strokeDashoffset='0';});
    shown.push(PTS[i]);fitCam(shown,PLAN_R,true,1.6);});});
  at(base+3*gap+500,()=>{const g=$('go');if(g)g.classList.add('show');fitCam(shown,PLAN_R,true,1.5);setGen(false);$('phlabel').textContent='✅ 多目的地已规划 · 点星河胶囊回看';reply('多目的地路线已就绪,出发吧 🚗');$('dockTt').textContent='🗺️ 多目的地 · 已规划';});
}

function playAll(){if(window.__seqRunning)return;window.__seqRunning=true;clearT();resetDOM();
  let t=bigSpeak(700);
  CMDS.forEach((cmd,i)=>{
    const start=t;
    if(i===1)at(start+480,()=>{if(history.length)bumpLocked();});   // 演示:生成「世界杯」时点叠放的天气卡 → 锁定抖动
    t=scheduleGen(t,cmd,i);
  });
  // ③ 导航 finale:折叠世界杯进叠放区 → 深度思考 + 多目的地地图路线
  navStage(t);
  const navEnd=t+11200;
  // ④ 收尾:叠放卡绽放进「星河」→ 展开提车 100 天记忆球 → 收回到动态窗口
  at(navEnd+1500,()=>{if(!bloomed)bloom();$('phlabel').textContent='叠放沉淀 → 绽放进星河';});
  at(navEnd+4000,()=>{sgFocus=4;sgRender();openExp(4);$('phlabel').textContent='展开 · 提车 100 天';});
  at(navEnd+6900,()=>{closeExp();$('phlabel').textContent='星河 · 回看其它沉淀';});
  at(navEnd+8100,()=>{collapseToWindow();$('phlabel').textContent='收回 · 回到动态窗口';});
  at(navEnd+9400,()=>{window.__seqRunning=false;$('phlabel').textContent='✅ 完整流程 · 点叠放卡再进星河';});}
$('ask').onclick=()=>{window.__seqRunning=false;playAll();};   // ▶ 显式重播
setTimeout(playAll,700);
</script>

<script>
/* ═══════════ 星河空间逻辑(叠放卡绽放 · 头脑特工队记忆球气质)═══════════ */
/* 星尘 */
(function(){const c=$('dust');if(!c)return;const x=c.getContext('2d');let W,H,d,ps=[];
  function rs(){d=Math.min(devicePixelRatio||1,2);W=c.clientWidth;H=c.clientHeight;c.width=W*d;c.height=H*d;x.setTransform(d,0,0,d,0,0);
    ps=[];const n=Math.round(W*H/9000);for(let i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+.3,a:Math.random()*.5+.15,tw:Math.random()*6.28,sp:.2+Math.random()*.5,vx:(Math.random()-.5)*.06,vy:(Math.random()-.5)*.05});}
  function f(){x.clearRect(0,0,W,H);for(const p of ps){p.tw+=.02*p.sp;p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x+=W;if(p.x>W)p.x-=W;if(p.y<0)p.y+=H;if(p.y>H)p.y-=H;const a=p.a*(.5+.5*Math.sin(p.tw));x.beginPath();x.arc(p.x,p.y,p.r,0,7);x.fillStyle=`rgba(200,220,255,${a})`;x.fill();}requestAnimationFrame(f);}
  rs();f();addEventListener('resize',rs);})();

/* 色调(单色调 luminous) */
const SG_HUE={
  weather:{rim:'rgba(124,168,218,.55)',in:'rgba(92,140,200,.17)',glow:'rgba(98,148,208,.4)', mid:'rgba(74,112,164,.5)', core:'rgba(150,200,255,.95)'},
  match:  {rim:'rgba(120,190,160,.55)',in:'rgba(82,168,138,.16)',glow:'rgba(96,180,150,.38)',mid:'rgba(62,142,112,.5)', core:'rgba(150,238,196,.95)'},
  mem:    {rim:'rgba(232,186,128,.55)',in:'rgba(210,162,104,.17)',glow:'rgba(222,176,116,.4)',mid:'rgba(174,122,70,.5)', core:'rgba(255,212,150,.95)'},
  wall:   {rim:'rgba(154,168,228,.5)', in:'rgba(124,144,214,.15)',glow:'rgba(144,162,226,.38)',mid:'rgba(100,112,174,.5)', core:'rgba(176,190,255,.95)'},
  moment: {rim:'rgba(240,170,148,.55)',in:'rgba(226,146,126,.17)',glow:'rgba(236,160,138,.4)',mid:'rgba(180,100,80,.5)', core:'rgba(255,188,166,.95)'}
};
function sgApplyHue(el,t){const h=SG_HUE[t];el.style.setProperty('--hrim',h.rim);el.style.setProperty('--hin',h.in);el.style.setProperty('--hglow',h.glow);el.style.setProperty('--hmid',h.mid);el.style.setProperty('--hpetal',h.core||h.rim);el.style.setProperty('--hcore','rgba(244,250,255,.92)');}
/* 转轮统一 Siri 质感:暖白光叶 + 冷蓝核心 + 冷调玻璃,几乎无彩色(色彩只在展开时涌现)*/
function sgApplySiri(el){el.style.setProperty('--hrim','rgba(152,178,222,.5)');el.style.setProperty('--hin','rgba(120,148,198,.13)');el.style.setProperty('--hglow','rgba(150,180,230,.3)');el.style.setProperty('--hmid','rgba(96,120,165,.5)');el.style.setProperty('--hpetal','rgba(255,247,234,.92)');el.style.setProperty('--hcore','rgba(150,196,255,.95)');}

/* 记忆球:前两颗=叠放的天气/世界杯卡,后三颗=已沉淀的对话记忆/生成壁纸/提车时刻 */
const SG_ORBS=[
  {type:'weather',em:'🌧',gl:'今夜天气',gs:'中雨 · 14°',
   body:`<div class="x-weather"><span class="xtag">🌧 过去卡片 · 今夜</span><div class="loc">上海 · 今夜</div><div class="big">14<sup>°</sup></div><div class="sub">中雨 · 体感 12° · 降水 80%</div>
   <div class="hrs">${[['现在','16°'],['22点','13°'],['23点','12°'],['0点','11°']].map(h=>`<div class="hr"><span>${h[0]}</span><b>${h[1]}</b></div>`).join('')}</div></div>`},
  {type:'match',em:'⚽',gl:'世界杯 A 组',gs:'阿根廷领跑',
   body:`<div class="x-match"><span class="xtag">⚽ 过去卡片 · A 组积分榜</span><div class="mt">第 3 轮后</div>${[['1','阿根廷','7',1],['2','法国','6',0],['3','巴西','4',0],['4','西班牙','0',0]].map(r=>`<div class="row"><span class="rk${r[3]?' top':''}">${r[0]}</span><span class="tm">${r[1]}</span><span class="pt">${r[2]}</span></div>`).join('')}</div>`},
  {type:'mem',em:'🧠',gl:'一段对话',gs:'那晚 · 很轻',
   body:`<div class="x-mem"><span class="xtag">🧠 对话总结 · 记忆</span><div class="q">「那晚你说有点累,<br>我们没聊正事——<br>就一起听完一首《十年》,到家。」</div><div class="meta">今晚 21:36 · 由这段对话沉淀</div></div>`},
  {type:'wall',em:'🖼',gl:'生成壁纸',gs:'极光 · 04',img:1,
   body:`<div class="x-wall"><span class="xtag">🖼 为你生成的壁纸</span><div class="cap2">极光 · 04<span>根据你常去的海边为你生成 · 可设为车机壁纸</span></div></div>`},
  {type:'moment',em:'🎉',gl:'提车 100 天',gs:'一路有你',moment:1,
   body:`<div class="x-moment"><span class="xtag">✨ 特别时刻 · 为你献上</span><div class="num">100</div><div class="ttl">提车 100 天</div>
   <div class="stats"><div class="st"><b>8,240</b><span>公里</span></div><div class="st"><b>127</b><span>次出行</span></div><div class="st"><b>31</b><span>新去处</span></div></div>
   <div class="bless">这 100 天,从清晨到深夜,<br>很高兴一路都有你。🥂</div></div>`}
];
const SGN=SG_ORBS.length;
let sgFocus=Math.floor(SGN/2), bloomed=false;

/* 建球 */
const sgWheel=$('wheel'),orbEls=[];
SG_ORBS.forEach((o,i)=>{
  const el=document.createElement('div');el.className='orb '+o.type;sgApplySiri(el);
  const lumens='<div class="lumens"><div class="swirl"><i class="l1"></i><i class="l2"></i><i class="l3"></i><i class="l4"></i></div><b class="lcore"></b></div>';
  const ball=`<div class="ball">${lumens}<div class="core"><span class="em">${o.em}</span></div></div>`;
  el.innerHTML=`<div class="float"><div class="ringglow"></div>${ball}<div class="ring"></div>${o.moment?'<div class="spk"></div>':''}<div class="cap"><span class="gl">${o.gl}</span><span class="gs">${o.gs}</span></div></div>`;
  el.querySelector('.float').style.animationDelay=(-i*1.4)+'s';
  if(o.moment){const spk=el.querySelector('.spk');for(let k=0;k<7;k++){const s=document.createElement('i');s.style.left=(22+Math.random()*56)+'%';s.style.top=(24+Math.random()*52)+'%';s.style.animationDelay=(Math.random()*3.4)+'s';spk.appendChild(s);}}
  sgWheel.appendChild(el);orbEls.push(el);
});
$('tickRow').innerHTML=['天气','赛事','记忆','壁纸','时刻'].map(s=>`<span>${s}</span>`).join('');
const sgTickSpans=[...$('tickRow').querySelectorAll('span')];

/* 转轮布局 */
const SGRX=458,SGRY=146,SGSTEP=0.55,SGCY=18;
const SG_ORIGIN='translate(-395px,-275px) scale(.1)';   // 收/放都从叠放卡的位置进出
function sgRender(){
  orbEls.forEach((el,i)=>{
    const off=i-sgFocus,ang=off*SGSTEP,depth=Math.cos(ang);
    const x=Math.sin(ang)*SGRX,y=(1-depth)*SGRY+SGCY,s=0.43+Math.max(0,depth)*0.6;
    const op=Math.max(0,Math.min(1,(depth-0.34)/0.6)),blur=Math.max(0,(1-depth))*5.4;
    el.style.transform=`translate(${x}px,${y}px) scale(${s.toFixed(3)})`;el.style.opacity=op.toFixed(2);
    el.style.filter=`blur(${blur.toFixed(1)}px)`;el.style.zIndex=String(100+Math.round(depth*100));
    el.classList.toggle('focus',Math.abs(off)<0.5);el.style.pointerEvents=op>0.15?'auto':'none';
  });
  const fr=Math.max(0,Math.min(SGN-1,sgFocus));
  $('tickRow').style.transform=`translate(${-fr*34-17}px,-50%)`;
  sgTickSpans.forEach((s,i)=>s.classList.toggle('on',Math.round(fr)===i));
  $('knobI').style.transform=`translateX(-50%) rotate(${sgFocus*32}deg)`;
  var pe=$('pedestal');if(pe)pe.style.setProperty('--phue','rgba(176,198,240,.5)');   // 光台中性冷白(转轮里几乎无彩色)
  var am=$('ambient');if(am&&!stage.classList.contains('detail'))am.style.setProperty('--ahue','transparent');   // 氛围色仅在展开时涌现
}
function sgSetT(t){orbEls.forEach(el=>el.style.transition=t?'transform .55s cubic-bezier(.2,.85,.25,1),opacity .55s ease,filter .55s ease':'none');}

/* 绽放:球从叠放卡升腾 */
function bloom(){
  sgSetT(false);orbEls.forEach(el=>{el.style.transform=SG_ORIGIN;el.style.opacity='0';el.style.filter='blur(6px)';});
  stage.classList.add('bloomed');bloomed=true;
  requestAnimationFrame(()=>orbEls.forEach((el,i)=>{
    const off=i-sgFocus,ang=off*SGSTEP,depth=Math.cos(ang),x=Math.sin(ang)*SGRX,y=(1-depth)*SGRY+SGCY,s=0.46+Math.max(0,depth)*0.54,op=Math.max(0,Math.min(1,(depth-0.32)/0.62)),blur=Math.max(0,(1-depth))*4;
    el.style.transition=`transform .95s cubic-bezier(.2,.9,.28,1) ${i*0.085}s, opacity .85s ease ${i*0.085}s, filter .85s ease ${i*0.085}s`;
    el.style.transform=`translate(${x}px,${y}px) scale(${s.toFixed(3)})`;el.style.opacity=op.toFixed(2);el.style.filter=`blur(${blur.toFixed(1)}px)`;
    el.style.zIndex=String(100+Math.round(depth*100));el.classList.toggle('focus',Math.abs(off)<0.5);
  }));
  setTimeout(()=>{sgSetT(false);sgRender();},1300);
}

/* 拖拽 + 吸附 + 点击 */
let sgDrag=null,sgSnapRAF=null;
function sgFindOrb(x,y){const t=document.elementFromPoint(x,y),o=t&&t.closest&&t.closest('.orb');return o?orbEls.indexOf(o):-1;}
sgWheel.addEventListener('pointerdown',e=>{if($('exp').classList.contains('show')||!bloomed)return;cancelAnimationFrame(sgSnapRAF);sgDrag={x:e.clientX,f0:sgFocus,moved:0};});
sgWheel.addEventListener('pointermove',e=>{if(!sgDrag)return;const dx=e.clientX-sgDrag.x;sgDrag.moved=Math.max(sgDrag.moved,Math.abs(dx));sgFocus=Math.max(-0.4,Math.min(SGN-0.6,sgDrag.f0-dx/240));sgRender();});
function sgEndDrag(e){if(!sgDrag)return;const tap=sgDrag.moved<7;sgDrag=null;
  if(tap){const idx=sgFindOrb(e.clientX,e.clientY);if(idx>=0){sgFocus=idx;sgRender();openExp(idx);return;}}
  sgSnapTo(Math.round(sgFocus));}
sgWheel.addEventListener('pointerup',sgEndDrag);
sgWheel.addEventListener('pointercancel',()=>{if(sgDrag){sgDrag=null;sgSnapTo(Math.round(sgFocus));}});
function sgSnapTo(t){t=Math.max(0,Math.min(SGN-1,t));cancelAnimationFrame(sgSnapRAF);const s0=sgFocus,t0=performance.now();
  (function step(now){const p=Math.min(1,(now-t0)/460),e=1-Math.pow(1-p,3);sgFocus=s0+(t-s0)*e;sgRender();if(p<1)sgSnapRAF=requestAnimationFrame(step);})(performance.now());}

/* 就地展开:球体放大 + 内部内容 */
function openExp(i){const o=SG_ORBS[i],big=$('orbBig');sgApplyHue(big,o.type);
  var am=$('ambient');if(am)am.style.setProperty('--ahue',SG_HUE[o.type].glow);   // 展开:该类色彩涌入背景
  big.classList.toggle('imgbig',!!o.img);
  big.querySelector('.pic')&&big.querySelector('.pic').remove();
  if(o.img){const p=document.createElement('div');p.className='pic aurora';big.insertBefore(p,big.firstChild);}
  $('expBody').innerHTML=o.body;$('exp').classList.add('show');stage.classList.add('detail');}
function closeExp(){$('exp').classList.remove('show');stage.classList.remove('detail');var am=$('ambient');if(am)am.style.setProperty('--ahue','transparent');}
$('expBack').onclick=closeExp;$('expScrim').onclick=closeExp;

/* 收回:球飞回叠放卡,动态窗口归位 */
function collapseToWindow(){closeExp();sgSetT(false);
  orbEls.forEach((el,i)=>{el.style.transition=`transform .7s cubic-bezier(.4,.2,.2,1) ${(SGN-1-i)*0.045}s,opacity .55s ease ${(SGN-1-i)*0.045}s,filter .5s ease`;el.style.transform=SG_ORIGIN;el.style.opacity='0';el.style.filter='blur(6px)';});
  stage.classList.remove('bloomed');bloomed=false;}

/* 入口:叠放卡 / 胶囊 → 进入星河(可带指定球) */
function enterSpace(orbIdx){try{clearT();}catch(e){}window.__seqRunning=false;
  if(!bloomed)bloom();
  if(typeof orbIdx==='number'&&orbIdx>=0)setTimeout(()=>{if(bloomed){sgFocus=orbIdx;sgRender();openExp(orbIdx);}},1250);}
function sgReset(){stage.classList.remove('bloomed','detail');$('exp').classList.remove('show');bloomed=false;sgFocus=Math.floor(SGN/2);sgSetT(false);
  orbEls.forEach(el=>{el.style.transform=SG_ORIGIN;el.style.opacity='0';el.style.filter='blur(6px)';});}
$('wclose').onclick=()=>{try{clearT();}catch(e){}window.__seqRunning=false;collapseToWindow();};
sgReset();
</script>

<script>
(function(){
  var orb=document.getElementById('mvaOrb')||document.getElementById('fabStream');if(!orb)return;
  var stage=document.querySelector('.stage');
  var dock=document.querySelector('.dock');
  var vz=document.querySelector('.voice-zone');   // 提前定义(音乐岛 playerwrap 在 feed 段之前就要用)
  var watch=[document.querySelector('.voice-zone'),document.querySelector('.statusbar')].filter(Boolean);

  /* ---------- 注入灵动胶囊样式 ---------- */
  var ITEM_H=34;
  var css=""
  +".di{position:absolute;left:22px;bottom:15px;height:42px;display:flex;align-items:center;"
  +"width:max-content;max-width:38px;overflow:hidden;border-radius:21px;z-index:60;opacity:0;pointer-events:none;"
  +"background:transparent;border:1px solid transparent;box-shadow:none;"
  +"transition:max-width .52s cubic-bezier(.34,1.46,.46,1),opacity .24s ease,background .3s ease,box-shadow .36s ease,border-color .3s ease;"
  +"-webkit-backdrop-filter:blur(0);backdrop-filter:blur(0)}"
  +".di.show{opacity:1}"
  +".di.open{max-width:430px;pointer-events:auto;cursor:pointer;background:rgba(11,14,20,.9);"

  }
  function buildFeed(list){
    ftrack.innerHTML=list.map(feedCardHTML).join('');
    [].forEach.call(ftrack.querySelectorAll('.fcard'),wireCard);
  }
  /* 一条 AI 推荐进来: feed 前台→顶部动效插卡; feed 隐藏→胶囊提示(且已进 feed 数据, 打开即在顶部) */
  /* 推荐 case 总表(仅这些, 不再出现其它): 来自业务清单 */
  var CASES=[
    {ic:'🔋',t:'Battery below 20%',s:'Charging station 3 km ahead — route there?',tag:'Maps'},
    {ic:'☕',t:"You've driven 2 hours straight",s:'Rest stop 5 km ahead — take a break?',tag:'Maps'},
    {ic:'🌅',t:'Golden-hour sky spotted',s:'Save this view to your gallery?',tag:'Gallery'},
    {ic:'🛡️',t:'Sentinel caught a risky event',s:'Just recorded — want to review it?',tag:'DVR'},
    {ic:'🛣️',t:'Turn on NOA assisted driving',s:'Let the car take the strain',tag:'ADAS'},
    {ic:'🎓',t:'Learn to unlock NOA',s:'Master assisted driving in minutes',tag:'ADAS'},
    {ic:'🌡️',t:'Tap to set a comfortable temp',s:'Cabin is outside the comfort zone',tag:'Climate'},
    {ic:'🧽',t:'Enable screen-cleaning mode?',s:'Lots of stray touches detected',tag:'Scene'},
    {ic:'🔊',t:'Navigation volume is 0',s:"You won't hear directions — turn it up?",tag:'Nav'},
    {ic:'🎃',t:'A holiday surprise is ready',s:'Halloween easter egg — tap to play',tag:'Surprise'}
  ],RECS=CASES,recIdx=0;
  function addRec(card){
    if((curFeed||DEFAULT_FEED).length>=4)return;                                 // 已有 4 条 → 停止生成
    card=card||RECS[(recIdx++)%RECS.length];
    curFeed=[Object.assign({fresh:true},card)].concat(curFeed||DEFAULT_FEED);   // 进 feed 数据
    if(curFeed.length>4)curFeed=curFeed.slice(0,4);                              // 上限 4 条
    if(activeView==='feed'&&vz&&vz.classList.contains('di-feedmode')){          // feed 在前台 → 顶部动效插一条
      var el=document.createElement('div');el.className='fcard arriving fresh';el.innerHTML=feedInner(card,'Just now');
      wireCard(el);
      ftrack.insertBefore(el,ftrack.firstChild);
      while(ftrack.children.length>4)ftrack.removeChild(ftrack.lastChild);
      requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.remove('arriving');});});
      setTimeout(function(){el.classList.remove('fresh');},4200);
    }else{                                                                       // feed 隐藏 → 底部胶囊提示有推荐进来
      present({title:card.t,sub:card.s,trail:'rec',accent:'feed'},{interval:999999});
    }
  }
  /* ---------- 双 view 切换器: content(场景生成的内容) <-> feed(推荐流) ----------
     胶囊永远展示"可切换到的那个 view"的入口; 点它就切到那个 view, 胶囊随之翻成另一个入口 */
  var activeView='content',engaged=false;
  var SC=SCENE();
  var T_CONTENT={title:SC.content.title,sub:SC.content.sub,trail:'done',accent:'content'};
  var T_FEED={title:'For You',sub:'4 new · tap to view',trail:'rec',accent:'feed'};   // 入口统一, 不出现具体的旧 case 文案
  var diMap=document.querySelector('.map');
  function setView(v){
    activeView=v;engaged=true;                       // 用户已交互 → 自动演示不再打断
    if(vz)vz.classList.remove('di-musicmode');if(playerwrap)playerwrap.classList.remove('open');  // 切 AI 内容/feed → 关音乐小窗
    stage.classList.remove('zone-hidden');         // 确保语音区可见
    if(v==='feed'){
      buildFeed(curFeed||DEFAULT_FEED);
      renderPinned();                              // 渲染固定区组件(含默认示例)
      if(vz)vz.classList.add('di-feedmode');       // 上面 = feed 流
      if(diMap)diMap.style.visibility='hidden';    // 隐藏地图等叠层, 避免透出
      requestAnimationFrame(function(){requestAnimationFrame(function(){feedwrap.classList.add('open');});});
    }else{
      feedwrap.classList.remove('open');
      if(diMap)diMap.style.visibility='';
      setTimeout(function(){if(activeView==='content'&&vz)vz.classList.remove('di-feedmode');},340); // 上面 = 场景内容
    }
    stopRotate();
    if(v==='feed')dismiss();                        // feed 流展开在上面 → 底部胶囊收起成光球(点球切回内容)
    else present(T_FEED,{interval:999999});          // content 时 → 胶囊展开显示"为你推荐"入口
  }
  function toggleView(){setView(activeView==='feed'?'content':'feed');}
  di.addEventListener('click',function(){toggleView();});  // 点胶囊=切到另一个 view(不依赖当前轮播条, 确定性)
  window.MVAIsland={present:present,update:update,dismiss:dismiss,advance:advance,setView:setView,toggleView:toggleView,addRec:addRec};

  /* ---------- 场景化内容: ①当前内容概况 ②AI推荐 (滚动轮播) + 点推荐展开的 feed ---------- */
  var DEFAULT_FEED=CASES.slice(0,4);             // 默认只展示 4 条(取 case 表前 4)
  function pickFeed(){return DEFAULT_FEED.slice();}   // 返回副本, 删除/插入不污染原表
  function SCENE(){     // 按页关键字取: gen=生成中文案, content=内容概况, feedT=推荐入口
    var t=(document.title||'')+' '+decodeURIComponent(location.pathname||'');
    function h(k){return t.indexOf(k)>=0;}
    if(h('雨')||h('天气'))    return {gen:'Generating tomorrow’s trip plan…',content:{title:'Trip plan · rain tomorrow',sub:'Feels 14° · bring an umbrella'},feedT:{title:'For you · leave by 7:40am',sub:'Avoid flooding · 4 more'}};
    if(h('导航')||h('目的地')) return {gen:'Planning your route…',content:{title:'Route planned · fast-charge stop',sub:'142 km · 1h 48m'},feedT:{title:'On the way · via Moganshan',sub:'Great weekend spot · 4 more'}};
    if(h('电影'))             return {gen:'Curating tonight’s picks…',content:{title:'3 top-rated movies for you',sub:'All under 90 min · commute-friendly'},feedT:{title:'You might like · a mystery short',sub:'Based on history · 4 more'}};
    if(h('氛围灯'))           return {gen:'Tuning the cabin mood…',content:{title:'Switched to “Gentle Night”',sub:'Warm pink · 40% bright'},feedT:{title:'Try · breathing light to the music',sub:'Synced to audio · 4 more'}};
    if(h('世界杯')||h('赛事')) return {gen:'Connecting to the live match…',content:{title:'Live · Argentina 1–0 France',sub:'67′ · Messi assist'},feedT:{title:'For you · first-half highlights',sub:'2-min recap · 4 more'}};
    if(h('记忆'))             return {gen:'Noting your preferences…',content:{title:'Saved · you like Eason Chan',sub:'Prioritized from now on'},feedT:{title:'For you · new single “Lonely Warrior”',sub:'Just released · 4 more'}};
    if(h('闲聊'))             return {gen:'Summarizing the chat…',content:{title:'Chat highlights organized',sub:'3 topics · cards generated'},feedT:{title:'For you · related content',sub:'From your chat · 4 more'}};
    if(h('舒适'))             return {gen:'Preparing a comfort scene…',content:{title:'Comfort scene ready',sub:'Seat · climate · scent set'},feedT:{title:'Try · Home mode',sub:'Auto-on before arrival · 4 more'}};
    if(h('飞花令'))           return {gen:'Writing a prompt…',content:{title:'Poetry game · round 3',sub:'Keyword “moon”'},feedT:{title:'Try · a different game',sub:'Idiom chain · 4 more'}};
    if(h('多人')||h('聊天'))   return {gen:'Syncing the group chat…',content:{title:'Back-seat talk transcribed',sub:'2 people · minutes ready'},feedT:{title:'For you · related content',sub:'4 more'}};
    if(h('思考')||h('指令'))   return {gen:'Thinking deeply…',content:{title:'Done · plan generated',sub:'3 steps'},feedT:{title:'For you · related content',sub:'4 more'}};
    if(h('负一屏')||h('车控')) return {gen:'Organizing car controls…',content:{title:'Control panel ready',sub:'Climate · media · charging'},feedT:{title:'For you · today',sub:'4 more'}};
    if(h('通知'))             return {gen:'Aggregating notifications…',content:{title:'3 notifications grouped',sub:'Sorted by priority'},feedT:{title:'For you · reminders',sub:'4 more'}};
    return {gen:'MVA is generating for you…',content:{title:'Today’s updates organized',sub:'Commute · media · reminders'},feedT:{title:'For you · 5 new',sub:'Live updates'}};
  }
  function runDemo(){
    curFeed=pickFeed();
    // 推荐陆续进来(涓流): 大部分时段没有, 偶尔来一条 → feed前台插卡 / feed隐藏弹胶囊
    function tick(){
      if(Math.random()<0.5)addRec();               // addRec 内部限 4 条
      if((curFeed||DEFAULT_FEED).length<4)setTimeout(tick,8000+Math.random()*6000);   // 满 4 条 → 停止随机生成
    }
    if((curFeed||DEFAULT_FEED).length<4)setTimeout(tick,2800);
  }

  /* ---------- 原有 busy/settle + 自动演示(静置即触发, 并加硬兜底) ---------- */
  var busy=true,settleT=null,demoed=false;
  function en(on){orb.classList.toggle('busy',!on);}
  function fireDemo(){if(demoed||engaged)return;demoed=true;runDemo();}
  function settle(){busy=false;en(true);setTimeout(fireDemo,1400);}
  function bump(){busy=true;en(false);clearTimeout(settleT);settleT=setTimeout(settle,1200);}
  try{var obs=new MutationObserver(bump);watch.forEach(function(n){obs.observe(n,{childList:true,subtree:true,characterData:true,attributes:true,attributeFilter:['class','style']});});}catch(e){}
  bump();
  setTimeout(fireDemo,5200);   // 硬兜底: 即使场景持续变动永不静置(如调试读数每帧刷新), 也保证胶囊冒出
  orb.onclick=function(){engaged=true;setView(activeView==='feed'?'content':'feed');};  // 点光球: 收起态→开feed, feed态→回内容
  orb.ondblclick=function(e){e.preventDefault();runDemo();};   // 双击光球: 随时重放灵动岛(便于查看/present)
  if(window.NEBULA_FEED_DEFAULT){engaged=true;curFeed=pickFeed();setView('feed');   // 负一屏: 默认即进全局 feed 视图
    if(!INVERT)setTimeout(function(){   // 首次进入手势指引(仅非方案B): 方案B 用「添加组件」按钮且演示太抢戏 → 不显示
      if(!feedwrap||!vz||!vz.classList.contains('di-feedmode'))return;
      var g=document.createElement('div');g.className='swipe-guide';
      g.innerHTML='<div class="sg-hint"><span class="ar">«</span>Swipe to add widgets</div>'
        +'<div class="sg-track"><div class="sg-trail"></div><div class="sg-hand"></div></div>';
      feedwrap.appendChild(g);
      setTimeout(function(){g.classList.add('gone');setTimeout(function(){if(g.parentNode)g.parentNode.removeChild(g);},560);},300+2*1400+150);
    },900);
  }

  if(/[?&]islandshow=1/.test(location.search)){   // 灵动岛单独展示模式(供录制): 收起↔消息进入↔展开↔收起 循环
    engaged=true;demoed=true;                      // 关掉常规自动演示, 避免干扰
    var ISMSGS=[
      {title:'Battery below 20%',sub:'Charging station 3 km ahead — route there?',trail:'rec',accent:'feed'},
      {title:'Sentinel caught a risky event',sub:'Just recorded — want to review it?',trail:'rec',accent:'feed'},
      {title:'Driven 2 hours straight',sub:'Rest stop 5 km ahead — take a break?',trail:'rec',accent:'content'}
    ];
    var isi=0;
    setTimeout(function isTick(){    // 先静置(收起态), 再逐条: 消息进入→展开→保持→收起→间隔
      present(ISMSGS[isi%ISMSGS.length],{hold:2300});
      isi++;
      setTimeout(isTick,2300+1900);
    },1100);
  }
  /* ========== 识别动效: avatar 右边的流动虹彩声波(取代上屏文字, 识别时随"音量"起伏) ========== */
  var svAsr=document.getElementById('svAsr');
  if(svAsr){
    var gx=document.createElement('div');gx.className='sv-glowfx';(stage||document.body).appendChild(gx);
    var COLORS=['#ff007f','#7928ca','#00dfd8','#0070f3','#ff6bb0','#a06bff'];
    var GW=340,blobs=[];
    for(var bi=0;bi<COLORS.length;bi++){
      var el=document.createElement('i'),w=104+(bi%3)*20,h=52,cx=34+bi*((GW-68)/(COLORS.length-1));
      el.style.left=cx+'px';el.style.width=w+'px';el.style.height=h+'px';
      el.style.marginLeft=(-w/2)+'px';el.style.marginTop=(-h/2)+'px';
      el.style.filter='blur('+(13+(bi%2)*3)+'px)';
      el.style.background='radial-gradient(ellipse,'+COLORS[bi]+',rgba(0,0,0,0) 70%)';   // 扁椭圆软光
      gx.appendChild(el);
      blobs.push({el:el,p:bi*1.25,sp:0.42+(bi%4)*0.12});   // sp=横向摆速; 相位错开→颜色横向流动
    }
    function placeGlow(){if(!svAsr)return;var av=document.getElementById('avatar');var cy=av?(stageY(av)+av.offsetHeight/2):(stageY(svAsr)+svAsr.offsetHeight/2);gx.style.left=stageX(svAsr)+'px';gx.style.top=(cy-3)+'px';}   // 垂直对齐 avatar 中心, 再上移一点
    placeGlow();try{addEventListener('resize',placeGlow);}catch(e){}
    var _env=0,_jt=0,_jitT=0,_jit=0,_pl=false;   // 识别时淡入; 只横向流动(无旋转/无上下扫); 说话→膨胀变亮
    (function vgFrame(now){
      var listening=svAsr.classList.contains('show')&&!svAsr.classList.contains('done');
      if(listening&&!_pl)placeGlow();_pl=listening;
      _env+=((listening?1:0)-_env)*0.08;
      gx.style.opacity=Math.min(1,_env*1.15).toFixed(2);
      if(_env>0.01){
        if(now-_jt>120){_jt=now;_jitT=listening?Math.random():0;}
        _jit+=(_jitT-_jit)*0.15;
        var amp=_env*(0.4+0.6*_jit),t=now*0.001;
        for(var i=0;i<blobs.length;i++){var bl=blobs[i];
          var dx=Math.sin(t*bl.sp+bl.p)*26*(0.5+amp);   // 只横向摆动/流动
          var sx=0.86+0.34*amp+0.07*Math.sin(t*0.9+bl.p);   // 只横向缩放(不往上下长→不溢出边界)
          bl.el.style.transform='translateX('+dx.toFixed(1)+'px) scaleX('+sx.toFixed(2)+')';
          bl.el.style.opacity=(0.5+0.42*amp).toFixed(2);
        }
      }
      requestAnimationFrame(vgFrame);
    })(performance.now());
  }
})();

/* ===== MVA 系统回复 TTS: 用预生成的 OpenAI 语音(tts/*.mp3)替代浏览器合成 —— 只念系统回复(.sv-reply / speak), 绝不念用户指令(.sv-asr) ===== */
(function(){
  function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
  var CLIP={
    'long day take a breather and relax':'tts/chat-1.mp3',
    'i m mercedes virtual assistant':'tts/chat-2.mp3',
    'moderate rain expected in shanghai tomorrow bring an umbrella':'tts/weather-1.mp3',
    'the glass is fogging up rain is falling outside':'tts/weather-2.mp3',
    'group a has 6 matches here is the full schedule':'tts/match-1.mp3',
    'sure i ve set the cabin light to warm pink for you':'tts/genui-1.mp3',
    'sure planning your multi stop route now':'tts/nav-1.mp3',
    'got it removing the kids pickup stop and re planning your route':'tts/nav-2.mp3',
    'done kids pickup removed continuing navigation':'tts/nav-3.mp3',
    'now playing ten years':'tts/music-1.mp3',
    'music window expanded switch to feed':'tts/music-2.mp3',
    'calling wei zhang':'tts/phone-1.mp3',
    'connected on call':'tts/phone-2.mp3'
  };
  var cur=null,q=[];
  function _next(){if(!q.length){cur=null;return;}cur=q.shift();cur.onended=_next;cur.onerror=_next;cur.play().catch(_next);}
  function mvaPlay(text){var f=CLIP[norm(text)];if(!f)return false;try{q.push(new Audio(f));if(!cur)_next();}catch(e){}return true;}   // 排队播放: 上一句播完再播下一句, 不打断
  window.mvaPlay=mvaPlay;
  try{var last=new WeakMap();[].forEach.call(document.querySelectorAll('.sv-reply'),function(el){
    new MutationObserver(function(){var t=(el.textContent||'').trim();if(t&&last.get(el)!==t){last.set(el,t);mvaPlay(t);}}).observe(el,{childList:true,characterData:true,subtree:true});
  });}catch(e){}                                  // 屏上系统回复 → 播对应语音
  try{if(typeof window.speak==='function'){var _spk=window.speak;window.speak=function(t){if(mvaPlay(t))return;return _spk.apply(this,arguments);};}}catch(e){}   // 闲聊页只 TTS → 包 speak()
})();
</script>
