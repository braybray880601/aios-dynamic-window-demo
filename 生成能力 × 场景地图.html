<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta name="robots" content="noindex,nofollow"/>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>奔驰 语音区 · 生成能力 × 场景地图</title>
<style>
  :root{--ink:#eef1f4;--soft:rgba(238,241,244,.62);--faint:rgba(238,241,244,.34);--gold:#ffcf6a;--bd:rgba(255,255,255,.09)}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#05070b;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}
  .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .stage{position:relative;width:1600px;height:900px;overflow:hidden;transform-origin:center center;border-radius:22px;
    background:radial-gradient(130% 120% at 18% 0%,#16203040 0%,transparent 55%),radial-gradient(120% 120% at 100% 100%,#1a1f2e 0%,#0e1420 45%,#080b12 100%);
    box-shadow:0 50px 140px rgba(0,0,0,.7)}
  .glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.12;pointer-events:none}
  .glow.g1{width:520px;height:520px;top:-160px;right:-120px;background:#ffcf6a}
  .glow.g2{width:560px;height:560px;bottom:-220px;left:-160px;background:#5bd6ff}

  .wrap{position:absolute;inset:0;padding:40px 56px 30px;display:flex;flex-direction:column}
  header{margin-bottom:16px}
  .eyebrow{font-size:12.5px;font-weight:700;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:9px}
  h1{font-size:35px;font-weight:800;letter-spacing:.01em;line-height:1.1}
  h1 b{background:linear-gradient(100deg,#fff,#ffcf6a 130%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .lede{margin-top:9px;font-size:14px;color:var(--soft);line-height:1.5}
  .lede .d{color:#cfe0ff;font-weight:600}.lede .c{color:#bfe8cf;font-weight:600}

  .rows{flex:1;display:flex;flex-direction:column;gap:12px;min-height:0}
  .row{flex:1;display:flex;gap:18px;background:rgba(22,28,40,.52);backdrop-filter:blur(18px);border-radius:16px;box-shadow:inset 0 0 0 1px var(--bd);padding:15px 20px;min-height:0;position:relative;overflow:hidden}
  .row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--ac);opacity:.9}
  .cap{flex:0 0 250px;display:flex;flex-direction:column;justify-content:center;gap:3px;border-right:1px solid rgba(255,255,255,.07);padding-right:18px}
  .cap .cn{display:flex;align-items:center;gap:10px}
  .cap .num{font-size:24px;font-weight:800;color:var(--ac);line-height:1}
  .cap .nm{font-size:18px;font-weight:800}
  .cap .df{font-size:11.5px;color:var(--soft);line-height:1.4}
  .cap .tag{align-self:flex-start;margin-top:4px;font-size:9.5px;font-weight:700;letter-spacing:.08em;color:var(--ac);background:rgba(255,255,255,.06);padding:2px 8px;border-radius:10px;filter:brightness(1.12)}

  .scn{flex:1;display:flex;flex-direction:column;justify-content:center;gap:9px;min-width:0}
  .grp{display:flex;align-items:flex-start;gap:11px}
  .gl{flex:none;width:84px;font-size:11px;font-weight:700;color:var(--soft);padding-top:4px}
  .gl.done{color:#9fd9b4}.gl.common{color:#9fb6e6}
  .chips{flex:1;display:flex;flex-wrap:wrap;gap:7px}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;line-height:1.3;padding:4px 11px;border-radius:20px;background:rgba(255,255,255,.04);box-shadow:inset 0 0 0 1px var(--bd);color:var(--soft)}
  .chip.done{color:var(--ink);box-shadow:inset 0 0 0 1px var(--ac);background:rgba(255,255,255,.05)}
  .chip.done::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--ac);flex:none}

  footer{margin-top:14px;font-size:11.5px;color:var(--faint);text-align:center;line-height:1.5}
  footer b{color:var(--soft);font-weight:600}
</style>
<style id="__aiosgate_css">
#__aiosgate{position:fixed;inset:0;z-index:2147483647;background:radial-gradient(130% 130% at 50% -10%,#141b27 0%,#0a0e15 48%,#05070b 100%);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
#__aiosgate *{box-sizing:border-box}
#__aiosgate .gcard{width:340px;max-width:86vw;text-align:center;padding:40px 34px 30px}
#__aiosgate .gorb{width:62px;height:62px;border-radius:50%;margin:0 auto 22px;background:conic-gradient(from 210deg,#7ab7ff,#c08bff,#ff9bb0,#ffd27a,#8be0c0,#7ab7ff);box-shadow:0 0 30px rgba(140,180,255,.45),inset 0 0 16px rgba(255,255,255,.35);animation:__gspin 7s linear infinite}
#__aiosgate .gt{font-size:19px;font-weight:680;letter-spacing:.2px;color:#fff;margin:0 0 6px}
#__aiosgate .gs{font-size:12.5px;color:rgba(255,255,255,.5);margin:0 0 26px;letter-spacing:.04em}
#__aiosgate .gin{width:100%;height:46px;border-radius:13px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:#fff;font-size:15px;text-align:center;letter-spacing:.18em;outline:none;transition:border-color .2s,background .2s,box-shadow .2s}
#__aiosgate .gin::placeholder{letter-spacing:.06em;color:rgba(255,255,255,.32)}
#__aiosgate .gin:focus{border-color:rgba(127,200,255,.6);background:rgba(255,255,255,.08);box-shadow:0 0 0 3px rgba(91,140,255,.18)}
#__aiosgate .gb{width:100%;height:46px;margin-top:12px;border:0;border-radius:13px;background:linear-gradient(150deg,#5b8cff,#7a5bff);color:#fff;font-size:14.5px;font-weight:640;letter-spacing:.04em;cursor:pointer;transition:filter .2s,transform .1s}
#__aiosgate .gb:hover{filter:brightness(1.08)}
#__aiosgate .gb:active{transform:scale(.985)}
#__aiosgate .ge{height:16px;margin-top:13px;font-size:12px;color:#ff8086;opacity:0;transition:opacity .2s}
#__aiosgate .gf{margin-top:22px;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.26)}
@keyframes __gspin{to{transform:rotate(360deg)}}
@keyframes __gshake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(5px)}50%{transform:translateX(-7px)}}
</style>
<script>
(function(){
  var KEY='aios_demo_unlock_v1';
  var HASH='cc35f579797e106bb3ea97001fc565e8eb7d6b0a385920f2fc6721ddcc606d59';
  function ok(){try{return localStorage.getItem(KEY)===HASH;}catch(e){return false;}}
  if(ok())return;
  function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){return Array.prototype.map.call(new Uint8Array(b),function(x){return ('0'+x.toString(16)).slice(-2);}).join('');});}
  function build(){
    if(document.getElementById('__aiosgate'))return;
    var ov=document.createElement('div');
    ov.id='__aiosgate';
    ov.innerHTML='<div class="gcard"><div class="gorb"></div><div class="gt">AIOS Dynamic Window</div><div class="gs">Mercedes-Benz · MVA — Private preview</div><input class="gin" id="__gp" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter password"><button class="gb" id="__gb">Unlock</button><div class="ge" id="__ge">Incorrect password</div><div class="gf">Authorized access only</div></div>';
    (document.body||document.documentElement).appendChild(ov);
    var inp=document.getElementById('__gp'),btn=document.getElementById('__gb'),err=document.getElementById('__ge'),card=ov.querySelector('.gcard'),busy=false;
    function go(){
      if(busy)return;busy=true;
      sha(inp.value||'').then(function(h){
        busy=false;
        if(h===HASH){try{localStorage.setItem(KEY,HASH);}catch(e){}ov.style.transition='opacity .4s ease';ov.style.opacity='0';setTimeout(function(){if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);},420);}
        else{err.style.opacity='1';inp.value='';card.style.animation='__gshake .42s';setTimeout(function(){card.style.animation='';},440);try{inp.focus();}catch(e){}}
      });
    }
    btn.addEventListener('click',go);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')go();else err.style.opacity='0';});
    setTimeout(function(){try{inp.focus();}catch(e){}},120);
  }
  if(document.documentElement)build();else document.addEventListener('DOMContentLoaded',build);
})();
</script>
</head>
<body>
<div class="viewport">
  <div class="stage" id="stage">
    <div class="glow g1"></div><div class="glow g2"></div>
    <div class="wrap">
      <header>
        <div class="eyebrow">奔驰 · 语音区 · 生成能力 × 场景</div>
        <h1>三种 AI 生成能力 —— <b>落到哪些场景</b></h1>
        <div class="lede">每种能力分别能用在哪——<span class="d">✅ 我们做过的 demo</span> · <span class="c">🚗 车机常见场景</span>。都在设计规范内生成。</div>
      </header>

      <div class="rows" id="rows"></div>

      <footer>🔒 全部在<b>设计规范</b>内生成(tokens / 栅格盒 / 原子语法 / 数据只读)——只决定"怎么呈现",不臆造数据。</footer>
    </div>
  </div>
</div>

<script>
const stage=document.getElementById('stage');
function fit(){stage.style.transform=`scale(${Math.min(innerWidth/1600,innerHeight/900)*0.985})`;}
addEventListener('resize',fit);fit();

const CAPS=[
  {ac:'#8aa6cc',num:'①',nm:'组合排布',tag:'选原子·编排',df:'选用哪些原子 · 定丰富度 · 编排版式 · 写文案',
   done:['世界杯 · 丰富度分档(比分→积分榜)','闲聊 · 回复长短分档','电影 · 三卡编排','推荐 Feed · 混排排序'],
   common:['天气 · 多项编排','附近搜索 · 列表 ↔ 卡片','日程 · 重点摘要','通知 · 聚合排版']},
  {ac:'#5bd6ff',num:'②',nm:'参数化生成',tag:'生成取值',df:'生成"取值"(图表/主题/参数),渲染器现成',
   done:['车况 · 能耗趋势','氛围灯 · 取色主题','电影 · 评分可视化','世界杯 · 控球率环'],
   common:['续航占比环 · 充电曲线','四轮胎压 · 电池健康','通勤时长对比','放歌 · 封面取色染座舱','空气质量环']},
  {ac:'#34d06a',num:'③',nm:'结构化生成',tag:'现搭骨架',df:'现搭版式骨架(情境界面 / 一次性卡片模板)',
   done:['飞花令 · 规则引导','深度思考 · 多目的地行程','Feed · 空状态 / 庆祝','电影 · 片单版式'],
   common:['模板:航班 · 快递 · 菜谱 · 票务 · 寻车 · ETC 账单','情境:首次引导 · 无网空状态 · 省油庆祝 · 保养/疲劳提醒']},
];
document.getElementById('rows').innerHTML=CAPS.map(c=>`<div class="row" style="--ac:${c.ac}">
  <div class="cap"><div class="cn"><span class="num">${c.num}</span><span class="nm">${c.nm}</span></div><div class="df">${c.df}</div><span class="tag">${c.tag}</span></div>
  <div class="scn">
    <div class="grp"><span class="gl done">✅ 我们做过</span><div class="chips">${c.done.map(x=>`<span class="chip done">${x}</span>`).join('')}</div></div>
    <div class="grp"><span class="gl common">🚗 车机常见</span><div class="chips">${c.common.map(x=>`<span class="chip">${x}</span>`).join('')}</div></div>
  </div>
</div>`).join('');
</script>
</body>
</html>
