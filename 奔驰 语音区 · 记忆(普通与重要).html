<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta name="robots" content="noindex,nofollow"/>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>奔驰 · 语音区 · 记忆（普通与重要）</title>
<!--
  场景：闲聊中的两类记忆，反差鲜明 —— 两者都发生在「语音区」内，不全屏。
  ① 普通记忆（克制）：随口说「我挺喜欢听陈奕迅的」，MVA 顺手记下 → 语音区淡入一枚金色 ✦ 小卡（已记住 · 偏好：陈奕迅），avatar 轻光晕，一会儿轻轻沉下。
  ② 重要记忆（仪式感）：说「你记住，今天是我和我老婆的结婚纪念日」→ 语音区里展开一块「深色房间 / 星空」小舞台，原创七彩虹彩记忆球凝聚成形→悬浮自转→珍重收纳，最后落成一张「重要记忆卡」落进 feed。
  注：动效与卡片都被限制在语音区容器内，不做全屏暗场；七彩球为原创演绎，非版权素材；不出现版权歌词正文。
-->
<style>
  :root{
    --sky-top:#d6ecf7;--sky-mid:#c4e3f3;--ground:#cdd1d6;--ground-low:#bfc3c8;
    --card-bg:rgba(255,255,255,.46);--card-bd:rgba(255,255,255,.55);
    --ink:#23262b;--ink-soft:rgba(35,38,43,.55);--ink-faint:rgba(35,38,43,.4);--blue:#2f6bff;--vz-w:392px;
    --gold:#8a5e12;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0e0f12;overflow:hidden;font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;-webkit-font-smoothing:antialiased;color:var(--ink)}
  .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .stage{position:relative;width:1300px;height:812px;overflow:hidden;transform-origin:center center;border-radius:18px;
    box-shadow:0 40px 120px rgba(0,0,0,.55);background:linear-gradient(180deg,var(--sky-top) 0%,var(--sky-mid) 26%,#cdd9dd 46%,var(--ground) 64%,var(--ground-low) 100%)}
  .hero{position:absolute;left:0;top:150px;width:1300px;height:430px;background:url("flyme-hero.jpg") center/cover no-repeat;
    -webkit-mask-image:linear-gradient(180deg,transparent 0,#000 16%,#000 80%,transparent 100%);mask-image:linear-gradient(180deg,transparent 0,#000 16%,#000 80%,transparent 100%)}

  /* 状态栏：头像→MVA 光球 + 顶栏识别 */
  .statusbar{position:absolute;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;z-index:55}
  .sb-left{display:flex;align-items:center;gap:13px;flex:1;min-width:0;height:100%;padding-right:24px}
  .avatar{width:36px;height:36px;border-radius:50%;flex:none;position:relative;background-image:linear-gradient(135deg,#f3c9b0,#cf9d86);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.7);transition:box-shadow .5s}
  .avatar::before{content:"";position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,#5b8cff,#9b6bff,#ff6b9b,#ffab5b,#5bd6ff,#5b8cff);filter:blur(1px);opacity:0;transition:opacity .55s;animation:spin 5s linear infinite}
  .avatar::after{content:"";position:absolute;inset:7px;border-radius:50%;background:radial-gradient(circle at 38% 34%,#fff,rgba(255,255,255,.6));box-shadow:0 0 14px rgba(255,255,255,.55);opacity:0;transition:opacity .55s}
  .avatar.awake{box-shadow:none;animation:breathe 3.2s ease-in-out infinite}
  .avatar.awake::before,.avatar.awake::after{opacity:1}
  @keyframes spin{to{transform:rotate(360deg)}}@keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .sb-voice{position:relative;display:flex;align-items:center;min-width:0;height:100%}
  .sv-asr{display:inline-flex;align-items:center;max-width:640px;overflow:hidden;white-space:nowrap;font-size:15.5px;font-weight:600;color:var(--ink);opacity:0;transition:opacity .35s,transform .4s,filter .4s}
  .sv-asr.show{opacity:1}.sv-asr.done{color:#3a9d54}.sv-asr.gone{opacity:0;transform:translateY(-7px);filter:blur(2px)}
  .sv-cur{display:inline-block;width:2px;height:16px;background:#3a9d54;margin-left:2px;animation:blink 1s step-end infinite}
  @keyframes blink{50%{opacity:0}}
  .sb-right{display:flex;align-items:center;gap:16px;flex:none}
  .sb-clock{font-size:19px;font-weight:500;letter-spacing:.5px}.sb-5g{font-size:10px;font-weight:700;vertical-align:top;margin-right:1px}

  /* 桌面家具 */
  .map{position:absolute;top:64px;left:40px;width:300px;border-radius:20px;background:rgba(70,78,86,.34);backdrop-filter:blur(22px) saturate(1.2);-webkit-backdrop-filter:blur(22px) saturate(1.2);box-shadow:0 8px 30px rgba(40,50,60,.18),inset 0 0 0 1px rgba(255,255,255,.18);overflow:hidden;z-index:25;color:#fff;transition:transform .45s cubic-bezier(.2,.7,.2,1)}
  .map-top{display:flex;align-items:center;gap:9px;padding:14px 16px}.map-top .t{flex:1;font-size:16px;font-weight:500}
  .map-quick{display:flex;background:rgba(20,24,28,.28)}.map-quick div{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 0;opacity:.9}.map-quick div+div{box-shadow:inset 1px 0 0 rgba(255,255,255,.1)}
  .weather{position:absolute;top:60px;right:36px;text-align:right;z-index:25}
  .weather .temp{font-size:60px;font-weight:200;line-height:.9;letter-spacing:-1px}.weather .temp sup{font-size:20px;font-weight:300;vertical-align:top;margin-left:2px}
  .weather .loc{font-size:15px;color:var(--ink-soft);margin-top:6px}
  .cards{position:absolute;left:40px;right:40px;bottom:84px;display:flex;gap:16px;z-index:15}
  .card{flex:1;height:96px;border-radius:18px;background:var(--card-bg);backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);box-shadow:0 8px 26px rgba(40,50,60,.12),inset 0 0 0 1px var(--card-bd);display:flex;align-items:center;gap:13px;padding:0 18px}
  .card .ic{width:42px;height:42px;border-radius:11px;flex:none;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,#fff,#eef1f4);box-shadow:0 2px 6px rgba(0,0,0,.06)}
  .card .ic.pink{background:linear-gradient(135deg,#ff7a9c,#ff5277);color:#fff}
  .card .big{font-size:18px;font-weight:600}.card .sub{font-size:12px;color:var(--ink-soft);margin-top:3px}.card .lnk{color:var(--blue);font-weight:600}
  .card .col2{display:flex;gap:18px;width:100%}
  .tyre{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink-soft);width:100%}.tyre .r{display:flex;justify-content:space-between}.tyre .tcar{align-self:center;width:26px;height:14px;border-radius:5px;background:rgba(35,38,43,.18);margin:1px 0}

  /* Dock */
  .dock{position:absolute;left:0;right:0;bottom:0;height:72px;z-index:30;display:flex;align-items:center;gap:18px;padding:0 22px;background:rgba(248,250,252,.5);backdrop-filter:blur(26px) saturate(1.3);-webkit-backdrop-filter:blur(26px) saturate(1.3);box-shadow:inset 0 1px 0 rgba(255,255,255,.6)}
  .dock .home{width:34px;height:34px;border-radius:50%;box-shadow:inset 0 0 0 2px rgba(35,38,43,.55);flex:none}
  .np{display:flex;align-items:center;gap:11px;width:248px;border-radius:14px;padding:5px 8px;margin-left:-6px}
  .np .cov{width:40px;height:40px;border-radius:9px;flex:none;background:linear-gradient(135deg,#ffb37a,#ff7eb0,#9b8cff)}
  .np .ti{font-size:14px;font-weight:600;line-height:1.25}.np .ar{font-size:11px;color:var(--ink-soft)}
  .np .eq{margin-left:auto;display:inline-flex;gap:2.5px;align-items:flex-end;height:15px}
  .np .eq i{width:3px;background:var(--blue);border-radius:2px;height:5px;animation:eq .9s ease-in-out infinite}
  .np .eq i:nth-child(2){animation-delay:.2s}.np .eq i:nth-child(3){animation-delay:.4s}.np .eq i:nth-child(4){animation-delay:.6s}
  @keyframes eq{0%,100%{height:4px}50%{height:15px}}
  .dock .sep{flex:1}.dock .ctrl{display:flex;align-items:center;gap:24px;color:rgba(35,38,43,.7)}
  .dock .ctrl .temp{display:flex;align-items:center;gap:9px;font-size:21px;font-weight:600;color:var(--ink)}
  .dock .ctrl .temp small{font-size:12px;color:var(--ink-soft)}.dock .ctrl .chev{font-size:13px;color:var(--ink-faint)}.dock .ctrl .it{font-size:19px}

  /* ════ 语音区 ════ */
  .voice-zone{position:absolute;left:40px;top:64px;z-index:50;width:var(--vz-w);display:flex;flex-direction:column;gap:12px}

  /* ── ① 普通记忆：直接复用「复杂导航」的思考小胶囊（同一组件，浅色变体）── */
  .think{display:none;flex-direction:column;gap:10px;width:100%}
  .think.show{display:flex;animation:thinkin .4s ease}
  @keyframes thinkin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .think-pill{display:flex;align-items:center;gap:13px;padding:10px 14px;cursor:pointer;background:rgba(255,255,255,.62);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);border-radius:18px;box-shadow:0 10px 28px rgba(40,50,60,.16),inset 0 0 0 1px rgba(255,255,255,.7)}
  .think-pill .spinner{width:20px;height:20px;border-radius:50%;flex:none;background:conic-gradient(from 0deg,rgba(125,140,255,0),#7d8cff,#b58cff,rgba(125,140,255,0));-webkit-mask:radial-gradient(circle 6px at center,transparent 98%,#000);mask:radial-gradient(circle 6px at center,transparent 98%,#000);animation:spin 1s linear infinite}
  .think-pill .now{flex:1;min-width:0;overflow:hidden}
  .think-pill .l1{font-size:14px;font-weight:700;color:#1c2330;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .think-pill .l1.roll{animation:roll-up .42s cubic-bezier(.2,.7,.2,1)}
  @keyframes roll-up{0%{transform:translateY(85%);opacity:0}100%{transform:translateY(0);opacity:1}}
  .think-pill .l2{font-size:11px;color:rgba(35,38,43,.5);white-space:nowrap;margin-top:1px}
  .think-pill .chev{font-size:12px;color:rgba(35,38,43,.5);transition:transform .3s;flex:none}
  .think.expanded .think-pill .chev{transform:rotate(180deg)}
  .think-panel{max-height:0;opacity:0;overflow:hidden;transition:max-height .4s cubic-bezier(.2,.8,.2,1),opacity .35s;background:rgba(255,255,255,.6);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);border-radius:16px;box-shadow:0 12px 32px rgba(40,50,60,.16),inset 0 0 0 1px rgba(255,255,255,.7)}
  .think.expanded .think-panel{max-height:220px;opacity:1}
  .tp-head{display:flex;align-items:center;gap:8px;padding:13px 16px 8px;font-size:13px;font-weight:700;color:#1c2330}
  .tp-orb{width:14px;height:14px;border-radius:50%;background:conic-gradient(from 0deg,#7d8cff,#b58cff,#ff8cd0,#7d8cff);animation:spin 3s linear infinite}
  .tp-list{padding:0 16px 14px}
  .tp-row{display:flex;align-items:center;gap:11px;padding:7px 0;font-size:13.5px}
  .tp-row+.tp-row{border-top:1px solid rgba(0,0,0,.05)}
  .tp-row .ic{width:17px;height:17px;border-radius:50%;flex:none;position:relative}
  .tp-row.todo{color:rgba(35,38,43,.4)}.tp-row.todo .ic{box-shadow:inset 0 0 0 1.5px rgba(35,38,43,.25)}
  .tp-row.active{color:#1c2330;font-weight:600}.tp-row.active .ic{box-shadow:inset 0 0 0 2px #8c8cff}.tp-row.active .ic::after{content:"";position:absolute;inset:4px;border-radius:50%;background:#9c8cff}
  .tp-row.done{color:rgba(35,38,43,.6)}.tp-row.done .ic{background:#34c06a}.tp-row.done .ic::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff}
  /* 记忆步骤：金色高亮（区别于普通步骤）*/
  .tp-row.is-mem.todo{color:rgba(150,110,40,.5)}
  .tp-row.is-mem.active,.tp-row.is-mem.done{color:#8a5e12;font-weight:700}
  .tp-row.is-mem .ic{background:linear-gradient(135deg,#ffd58a,#ff9d3c);box-shadow:0 0 9px rgba(255,170,80,.6)}
  .tp-row.is-mem .ic::after{content:"✦";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#5a3a00}
  .tp-row .mem-tag{margin-left:auto;font-size:10px;font-weight:700;color:#8a5e12;background:rgba(255,180,90,.22);padding:2px 8px;border-radius:6px}
  .think-pill.mem .l1{color:#8a5e12}

  /* ── avatar 记忆光晕 ── */
  .mem-halo{position:absolute;inset:-10px;border-radius:50%;pointer-events:none;opacity:0;background:radial-gradient(circle,rgba(255,213,138,.6),rgba(255,213,138,0) 66%)}
  .avatar.mem .mem-halo{animation:memglow 1.15s ease-out}
  .mem-halo::before,.mem-halo::after{content:"";position:absolute;inset:8px;border-radius:50%;border:2px solid rgba(255,210,135,.9);opacity:0}
  .avatar.mem .mem-halo::before{animation:memring 1.15s ease-out}
  .avatar.mem .mem-halo::after{animation:memring 1.15s ease-out .32s}
  @keyframes memglow{0%{opacity:0;transform:scale(.55)}22%{opacity:1}100%{opacity:0;transform:scale(2.3)}}
  @keyframes memring{0%{transform:scale(.7);opacity:.95}100%{transform:scale(2.5);opacity:0}}
  /* ── TTS 播报时：avatar 持续光环涟漪（说话结束即消失）── */
  .tts-wave{position:absolute;inset:-5px;border-radius:50%;pointer-events:none;opacity:0;transition:opacity .25s;
    background:radial-gradient(circle,rgba(120,150,255,.34),rgba(120,150,255,0) 66%)}
  .avatar.speaking .tts-wave{opacity:1;animation:ttsglow 1.4s ease-in-out infinite}
  @keyframes ttsglow{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.16);opacity:.9}}
  .tts-wave::before,.tts-wave::after{content:"";position:absolute;inset:3px;border-radius:50%;border:2px solid rgba(140,165,255,.9);opacity:0}
  .avatar.speaking .tts-wave::before{animation:ttsripple 1.5s ease-out infinite}
  .avatar.speaking .tts-wave::after{animation:ttsripple 1.5s ease-out infinite .75s}
  @keyframes ttsripple{0%{transform:scale(.8);opacity:.9}70%{opacity:.22}100%{transform:scale(2.2);opacity:0}}

  /* ── ② 重要记忆：语音区内「深色房间」小舞台 + 七彩球仪式 ── */
  .rite{display:none;width:100%}
  .rite.show{display:block;animation:ritein .45s ease}
  @keyframes ritein{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
  .orb-stage{position:relative;width:100%;height:208px;border-radius:20px;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(120% 100% at 50% 30%,#2a1f50 0%,#171036 52%,#0c0822 100%);
    box-shadow:0 18px 44px rgba(22,12,46,.42),inset 0 0 0 1px rgba(255,255,255,.1)}
  .rite-stars{position:absolute;inset:0;pointer-events:none}
  .rite-stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;box-shadow:0 0 6px 1px rgba(255,255,255,.8);animation:twinkle 2.6s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1.2)}}

  /* 球 wrap：用 class+transition 驱动 凝聚(显)→收纳(隐)，避免动效 fill 丢失导致隐形 */
  .orb-wrap{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;
    transform:scale(.2);opacity:0;transition:transform 1.1s cubic-bezier(.2,.8,.2,1),opacity .7s ease}
  .rite.lit .orb-wrap{transform:scale(1);opacity:1}
  .rite.storing .orb-wrap{transform:translateY(34px) scale(.12);opacity:0;transition:transform .7s cubic-bezier(.5,0,.3,1),opacity .55s ease}
  .orb-core{position:relative;width:150px;height:150px;display:flex;align-items:center;justify-content:center;animation:orbfloat 3.6s ease-in-out infinite}
  @keyframes orbfloat{0%,100%{transform:translateY(-7px)}50%{transform:translateY(7px)}}
  .orb-glow{position:absolute;width:210px;height:210px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,150,210,.5),rgba(120,150,255,.26) 44%,rgba(120,150,255,0) 70%);
    filter:blur(16px);animation:glowpulse 3.4s ease-in-out infinite}
  @keyframes glowpulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.12)}}
  #orbCanvas{width:150px;height:150px;border-radius:50%;position:relative;
    box-shadow:0 0 40px 5px rgba(255,170,220,.45),0 0 70px 16px rgba(140,170,255,.28),inset 0 0 40px rgba(255,255,255,.16);filter:saturate(1.18)}
  .orb-spark{position:absolute;width:4px;height:4px;border-radius:50%;background:#fff;box-shadow:0 0 7px 2px rgba(255,230,255,.9);opacity:0;left:50%;top:50%;margin:-2px}
  .rite.lit .orb-spark{animation:sparkorbit linear infinite}
  @keyframes sparkorbit{from{transform:rotate(0) translateX(72px) rotate(0);opacity:.9}50%{opacity:.35}to{transform:rotate(360deg) translateX(72px) rotate(-360deg);opacity:.9}}

  /* ── feed：重要记忆卡（落成） ── */
  .feed{display:flex;flex-direction:column;gap:12px;width:100%}
  .memcard{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:18px;
    background:linear-gradient(135deg,rgba(40,28,66,.92),rgba(24,18,48,.9));
    backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
    box-shadow:0 18px 44px rgba(20,10,40,.42),inset 0 0 0 1px rgba(255,255,255,.14);
    color:#fff;opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.8,.2,1)}
  .memcard.in{opacity:1;transform:none}
  .mc-orb{width:46px;height:46px;border-radius:50%;flex:none;position:relative;
    background:conic-gradient(from 200deg,#ff9ec8,#ffd28a,#9be7c4,#8cc5ff,#c79bff,#ff9ec8);
    box-shadow:0 0 18px rgba(255,180,220,.6),inset 0 0 14px rgba(255,255,255,.3);animation:spin 7s linear infinite}
  .mc-orb::after{content:"";position:absolute;inset:8px;border-radius:50%;background:radial-gradient(circle at 36% 32%,rgba(255,255,255,.95),rgba(255,255,255,0) 60%)}
  .mc-body{flex:1;min-width:0}
  .mc-k{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:800;letter-spacing:.14em;color:#ffd9a3;text-transform:uppercase}
  .mc-k .dot{width:6px;height:6px;border-radius:50%;background:#ffd28a;box-shadow:0 0 8px #ffce8a}
  .mc-title{font-size:19px;font-weight:800;margin-top:5px;letter-spacing:.01em;
    background:linear-gradient(90deg,#fff,#ffe6c2);-webkit-background-clip:text;background-clip:text;color:transparent}
  .mc-sub{font-size:12px;color:rgba(255,255,255,.66);margin-top:4px}
  .mc-sub b{color:#ffd9a3;font-weight:700}
  .mc-date{margin-left:auto;flex:none;text-align:center;padding-left:12px;color:#fff}
  .mc-date .d{font-size:21px;font-weight:800;line-height:1}
  .mc-date .m{font-size:10px;color:rgba(255,255,255,.6);margin-top:3px;letter-spacing:.06em}

  /* 面板 */
  .panel{position:fixed;top:18px;right:18px;width:250px;z-index:100;background:rgba(20,22,26,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px;padding:15px;color:#e8eaee;font-size:12.5px;box-shadow:0 20px 50px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.08)}
  .panel .title{font-size:13.5px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px;margin-bottom:12px}
  .panel .title i{width:8px;height:8px;border-radius:50%;background:conic-gradient(from 0deg,#5b8cff,#ff6b9b,#ffab5b,#5b8cff)}
  .panel h4{font-size:11px;letter-spacing:.1em;color:#9aa0a8;font-weight:700;margin:6px 0 8px}
  .vbtns{display:flex;flex-direction:column;gap:7px}
  .vbtn{display:flex;align-items:center;gap:10px;border:0;border-radius:11px;cursor:pointer;font-family:inherit;text-align:left;background:rgba(255,255,255,.07);color:#dfe3e8;padding:11px 13px;transition:.15s}
  .vbtn:hover{background:rgba(255,255,255,.13)}.vbtn.on{background:var(--blue);color:#fff;box-shadow:0 4px 14px rgba(47,107,255,.45)}
  .vbtn .k{font-size:13.5px;font-weight:700}.vbtn .d{font-size:11px;opacity:.72;margin-top:1px}
  .vbtn.mem .k{color:#ffd58a}

<script>
(function(){
  var KEY='aios_demo_unlock_v1';
  var HASH='cc35f579797e106bb3ea97001fc565e8eb7d6b0a385920f2fc6721ddcc606d59';
  function ok(){try{return localStorage.getItem(KEY)===HASH;}catch(e){return false;}}
  if(ok())return;
  function sha(s){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(s)).then(function(b){return Array.prototype.map.call(new Uint8Array(b),function(x){return ('0'+x.toString(16)).slice(-2);}).join('');});}
  function build(){
    if(document.getElementById('__aiosgate'))return;
    var ov=document.createElement('div');
    ov.id='__aiosgate';
    ov.innerHTML='<div class="gcard"><div class="gorb"></div><div class="gt">AIOS Dynamic Window</div><div class="gs">Mercedes-Benz · MVA — Private preview</div><input class="gin" id="__gp" type="password" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter password"><button class="gb" id="__gb">Unlock</button><div class="ge" id="__ge">Incorrect password</div><div class="gf">Authorized access only</div></div>';
    (document.body||document.documentElement).appendChild(ov);
    var inp=document.getElementById('__gp'),btn=document.getElementById('__gb'),err=document.getElementById('__ge'),card=ov.querySelector('.gcard'),busy=false;
    function go(){
      if(busy)return;busy=true;
      sha(inp.value||'').then(function(h){
        busy=false;
        if(h===HASH){try{localStorage.setItem(KEY,HASH);}catch(e){}ov.style.transition='opacity .4s ease';ov.style.opacity='0';setTimeout(function(){if(ov&&ov.parentNode)ov.parentNode.removeChild(ov);},420);}
        else{err.style.opacity='1';inp.value='';card.style.animation='__gshake .42s';setTimeout(function(){card.style.animation='';},440);try{inp.focus();}catch(e){}}
      });
    }
    btn.addEventListener('click',go);
    inp.addEventListener('keydown',function(e){if(e.key==='Enter')go();else err.style.opacity='0';});
    setTimeout(function(){try{inp.focus();}catch(e){}},120);
  }
  if(document.documentElement)build();else document.addEventListener('DOMContentLoaded',build);
})();
</script>

<script>
const stage=document.getElementById('stage');
function fit(){stage.style.transform=`scale(${Math.min(innerWidth/1300,innerHeight/812)*0.985})`;}
addEventListener('resize',fit);fit();
const $=id=>document.getElementById(id);

/* ───────── 时间线 ───────── */
const timers=[];const at=(ms,fn)=>timers.push(setTimeout(fn,ms));
function clearT(){timers.forEach(clearTimeout);timers.length=0;}

/* ───────── 七彩虹彩球 canvas ───────── */
const cv=$('orbCanvas'),ctx=cv.getContext('2d');
const CW=cv.width,CH=cv.height,CX=CW/2,CY=CH/2,R=CW*0.40;
let orbT=0,orbRAF=0;
function drawOrb(){
  orbT+=0.012;
  ctx.clearRect(0,0,CW,CH);
  ctx.save();
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.clip();
  let base=ctx.createRadialGradient(CX,CY,0,CX,CY,R);
  base.addColorStop(0,'#3a2c5e');base.addColorStop(1,'#150f2c');
  ctx.fillStyle=base;ctx.fillRect(0,0,CW,CH);
  const cols=[
    ['rgba(255,120,190,',0],['rgba(255,200,120,',1],['rgba(150,235,180,',2],
    ['rgba(120,180,255,',3],['rgba(200,140,255,',4],['rgba(120,235,235,',5]
  ];
  ctx.globalCompositeOperation='screen';
  cols.forEach((c,i)=>{
    const a=orbT*(0.8+i*0.06)+i*(Math.PI*2/cols.length);
    const ox=CX+Math.cos(a)*R*0.42, oy=CY+Math.sin(a*1.1)*R*0.42;
    const g=ctx.createRadialGradient(ox,oy,0,ox,oy,R*1.15);
    g.addColorStop(0,c[0]+'0.9)');
    g.addColorStop(0.4,c[0]+'0.34)');
    g.addColorStop(1,c[0]+'0)');
    ctx.fillStyle=g;ctx.fillRect(0,0,CW,CH);
  });
  const sw=CX+Math.cos(orbT*1.6)*R*0.2, sh=CY+Math.sin(orbT*1.3)*R*0.2;
  const core=ctx.createRadialGradient(sw,sh,0,sw,sh,R*0.7);
  core.addColorStop(0,'rgba(255,255,255,0.55)');
  core.addColorStop(0.5,'rgba(255,235,255,0.12)');
  core.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=core;ctx.fillRect(0,0,CW,CH);
  ctx.globalCompositeOperation='source-over';
  const hx=CX-R*0.34,hy=CY-R*0.4;
  const hl=ctx.createRadialGradient(hx,hy,0,hx,hy,R*0.7);
  hl.addColorStop(0,'rgba(255,255,255,0.85)');
  hl.addColorStop(0.18,'rgba(255,255,255,0.32)');
  hl.addColorStop(0.5,'rgba(255,255,255,0)');
  ctx.fillStyle=hl;ctx.beginPath();ctx.arc(hx,hy,R*0.55,0,Math.PI*2);ctx.fill();
  const rim=ctx.createRadialGradient(CX,CY,R*0.62,CX,CY,R);
  rim.addColorStop(0,'rgba(0,0,0,0)');
  rim.addColorStop(0.86,'rgba(20,10,40,0.18)');
  rim.addColorStop(1,'rgba(10,6,26,0.5)');
  ctx.fillStyle=rim;ctx.fillRect(0,0,CW,CH);
  for(let k=0;k<5;k++){
    const a=orbT*1.4+k*1.7;
    const px=CX+Math.cos(a)*R*0.55, py=CY+Math.sin(a*1.2)*R*0.5;
    const tw=0.4+0.6*Math.abs(Math.sin(orbT*3+k));
    ctx.fillStyle='rgba(255,255,255,'+(tw*0.8)+')';
    ctx.beginPath();ctx.arc(px,py,1.6,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  ctx.strokeStyle='rgba(255,255,255,0.4)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(CX,CY,R-3,Math.PI*1.15,Math.PI*1.55);ctx.stroke();
  orbRAF=requestAnimationFrame(drawOrb);
}
function startOrb(){if(!orbRAF)drawOrb();}
function stopOrb(){cancelAnimationFrame(orbRAF);orbRAF=0;}

/* 星辉背景 + 轨道粒子（一次性生成；用确定式分布，避免随机） */
(function buildStars(){
  const s=$('riteStars');let h='';
  for(let i=0;i<20;i++){
    h+=`<i style="left:${(i*53%100)}%;top:${(i*37%100)}%;animation-delay:${((i%6)*0.4).toFixed(2)}s"></i>`;
  }
  s.innerHTML=h;
})();
(function buildSparks(){
  const w=$('orbWrap');
  for(let i=0;i<6;i++){
    const d=document.createElement('span');d.className='orb-spark';
    d.style.animationDuration=(5+i*0.5).toFixed(1)+'s';
    d.style.animationDelay=(-(i*0.8)).toFixed(1)+'s';
    w.appendChild(d);
  }
})();

/* ───────── ASR 逐字 ───────── */
function typeASR(text,dur){const el=$('asrText'),sc=$('svAsr');let i=0;const step=dur/text.length;
  (function tick(){el.textContent=text.slice(0,i);sc.scrollLeft=sc.scrollWidth;if(i++<=text.length)timers.push(setTimeout(tick,step));})();}

/* ───────── TTS：浏览器语音合成（系统回复靠它播报，画面无文字）───────── */
let ttsOn=true,bestVoice=null;
function setSpeaking(on){const a=$('avatar');if(a)a.classList.toggle('speaking',!!on);}
function ttsStop(){try{window.speechSynthesis&&window.speechSynthesis.cancel();}catch(e){}setSpeaking(false);}
function pickVoice(){
  try{
    const vs=window.speechSynthesis.getVoices()||[];
    const zh=vs.filter(v=>/zh|cmn|chinese|中文/i.test((v.lang||'')+' '+(v.name||'')));
    if(!zh.length){bestVoice=null;return;}
    const score=v=>{const n=v.name||'',l=v.lang||'';let s=0;
      if(v.default)s+=10;                                // 跟随系统「系统声音」所选(用户选了 瀚（高音质）)
      if(/瀚|高音质|高质量/i.test(n))s+=8;                // 瀚 等高音质嗓音
      if(/zh[-_]?CN|cmn/i.test(l))s+=4;
      if(/siri/i.test(n))s+=6;
      if(/premium|enhanced|增强/i.test(n))s+=5;
      if(/tingting|ting[-\s]?ting|婷婷/i.test(n))s+=3;
      if(/meijia|美佳|sinji|善怡/i.test(n))s+=1;
      if(v.localService)s+=1;
      return s;};
    bestVoice=zh.slice().sort((a,b)=>score(b)-score(a))[0]||null;
  }catch(e){bestVoice=null;}
}
function speak(text){
  if(!ttsOn||!text)return;
  try{
    if(!('speechSynthesis' in window))return;
    if(!bestVoice)pickVoice();
    const u=new SpeechSynthesisUtterance(text);
    u.lang=(bestVoice&&bestVoice.lang)||'zh-CN';u.rate=.97;u.pitch=1.02;
    if(bestVoice)u.voice=bestVoice;
    u.onstart=()=>setSpeaking(true);
    u.onend=()=>setSpeaking(false);
    u.onerror=()=>setSpeaking(false);
    window.speechSynthesis.cancel();
    setSpeaking(true);
    window.speechSynthesis.speak(u);
  }catch(e){}
}
try{if('speechSynthesis' in window){pickVoice();window.speechSynthesis.onvoiceschanged=pickVoice;}}catch(e){}

/* ───────── 地图让位（按语音区实际高度下推）───────── */
function syncMapPush(){const m=document.querySelector('.map');
  const has=$('think').classList.contains('show')||$('rite').classList.contains('show')||$('feed').children.length;
  m.style.transform=has?('translateY('+($('vz').offsetHeight+12)+'px)'):'';}

/* ───────── DOM 复位 ───────── */
function resetDOM(){
  $('avatar').classList.remove('awake','mem','speaking');
  $('svAsr').className='sv-asr';$('svAsr').style.display='';$('asrText').textContent='';$('svAsr').scrollLeft=0;$('asrCur').style.display='';
  $('think').classList.remove('show','expanded');$('tpList').innerHTML='';$('thinkPill').classList.remove('mem');
  $('thinkNow').textContent='思考中…';$('thinkNext').textContent='点开查看处理过程';
  $('rite').className='rite';
  $('feed').innerHTML='';
  stopOrb();
  document.querySelector('.map').style.transform='';
  $('phlabel').textContent='待机';
}
function reset(){clearT();ttsStop();resetDOM();}

/* avatar 记忆光晕 */
function memPulse(){const a=$('avatar');a.classList.remove('mem');void a.offsetWidth;a.classList.add('mem');at(1300,()=>a.classList.remove('mem'));}

/* ───────── 思考小胶囊（与复杂导航同一组件；步骤 {t, mem?}）───────── */
function showCapsule(steps){$('think').classList.add('show');
  $('tpList').innerHTML=steps.map((s,i)=>`<div class="tp-row todo${s.mem?' is-mem':''}" id="tpr${i}"><span class="ic"></span><span>${s.t}</span>${s.mem?'<span class="mem-tag">记忆</span>':''}</div>`).join('');
  syncMapPush();}
function setCap(steps,k){const s=steps[k],now=$('thinkNow');
  now.textContent=(s.mem?'✦ ':'')+s.t;now.classList.remove('roll');void now.offsetWidth;now.classList.add('roll');
  $('thinkPill').classList.toggle('mem',!!s.mem);
  steps.forEach((x,j)=>{const r=$('tpr'+j);if(r)r.className='tp-row '+(j<k?'done':j===k?'active':'todo')+(x.mem?' is-mem':'');});
  if(s.mem)memPulse();}
function capDone(steps){steps.forEach((x,j)=>{const r=$('tpr'+j);if(r)r.className='tp-row done'+(x.mem?' is-mem':'');});
  $('thinkPill').classList.remove('mem');}
$('thinkPill').onclick=()=>{$('think').classList.toggle('expanded');syncMapPush();};   // 点开/收起处理过程

/* 一轮发声：识别（逐字上屏）→ 回复（仅 TTS） */
function voiceTurn(t0,asr,reply,after){
  const dur=Math.max(1100,asr.length*130);
  at(t0,()=>{
    $('avatar').classList.add('awake');
    $('svAsr').className='sv-asr show';$('svAsr').style.display='';$('asrText').textContent='';$('asrCur').style.display='';
    typeASR(asr,dur);$('phlabel').textContent='聆听 · 识别中';
  });
  const t1=t0+dur+300;
  at(t1,()=>{$('asrCur').style.display='none';$('svAsr').classList.add('done');});
  at(t1+450,()=>$('svAsr').classList.add('gone'));
  const replyAt=t1+700;
  at(replyAt,()=>{$('svAsr').style.display='none';speak(reply);$('phlabel').textContent='回复 · 语音播报（TTS）';if(after)after();});
  return replyAt;
}

/* ═══ ① 普通记忆：走思考小胶囊（理解 → 写入记忆），与复杂导航同一组件 ═══ */
function playNormal(){
  reset();
  const steps=[{t:'理解对话内容'},{t:'写入记忆：偏好 · 陈奕迅',mem:1}];
  voiceTurn(600,'我平时挺喜欢听陈奕迅的','嗯，记下啦，以后多给你推荐他的歌。',()=>{
    showCapsule(steps);$('phlabel').textContent='思考中（可点开处理过程）';

/* ═══ ② 重要记忆：语音区内七彩球仪式 ═══ */
function playImportant(){
  reset();
  voiceTurn(600,'你记住，今天是我和我老婆的结婚纪念日','这一天，我替你郑重收好了。每年今天，我都会陪你记得。',()=>{
    runRite();
  });
}
function runRite(){
  const rite=$('rite');
  rite.className='rite show';syncMapPush();
  startOrb();memPulse();
  $('phlabel').textContent='重要记忆 · 凝聚中…';
  at(140,()=>rite.classList.add('lit'));                 // 球凝聚成形（显）
  at(900,()=>$('phlabel').textContent='重要记忆 · 悬浮自转');
  at(3700,()=>{rite.classList.add('storing');$('phlabel').textContent='珍重收纳…';}); // 球收纳（隐）
  at(4450,()=>{                                            // 落成重要记忆卡 + 收起暗舞台
    rite.className='rite';stopOrb();
    addImportantCard();syncMapPush();
    $('phlabel').textContent='已铭记 · 结婚纪念日';
  });
}
function addImportantCard(){
  const d=new Date();
  const mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  const c=document.createElement('div');
  c.className='memcard';
  c.innerHTML=
    '<div class="mc-orb"></div>'+
    '<div class="mc-body">'+
      '<div class="mc-k"><span class="dot"></span>已铭记 · 重要记忆</div>'+
      '<div class="mc-title">结婚纪念日</div>'+
      '<div class="mc-sub">和 <b>太太</b> 的纪念日 · 每年今天我都会提醒你</div>'+
    '</div>'+
    '<div class="mc-date"><div class="d">'+mm+'·'+dd+'</div><div class="m">已收藏</div></div>';
  $('feed').appendChild(c);
  requestAnimationFrame(()=>{c.classList.add('in');syncMapPush();});
}

/* ───────── 控制台 ───────── */
const ACT={normal:playNormal,important:playImportant,reset:reset};
function play(key){
  [...$('vbtns').children].forEach(b=>{if(b.dataset.v)b.classList.toggle('on',b.dataset.v===key);});
  (ACT[key]||reset)();
}
$('vbtns').addEventListener('click',e=>{const b=e.target.closest('.vbtn[data-v]');if(b)play(b.dataset.v);});
$('ttsToggle').onclick=()=>{ttsOn=!ttsOn;const b=$('ttsToggle');b.classList.toggle('on',ttsOn);b.querySelector('.k').textContent=ttsOn?'🔊 TTS 开':'🔇 TTS 关';if(!ttsOn)ttsStop();};

setTimeout(()=>play('normal'),600);
</script>

    function goRec(i){
      if(!RECITEMS.length){strip.classList.add('empty');return;}
      rIdx=(i+RECITEMS.length)%RECITEMS.length;
      rtrack.style.transform='translateX('+(-rIdx*100)+'%)';
      [].forEach.call(rdots.children,function(d,k){d.classList.toggle('on',k===rIdx);});
      var rem=RECITEMS.length-1-rIdx;
      strip.querySelector('.rec-q').textContent=RECITEMS.length<=1?'Only one':(rem>0?('Swipe · +'+rem+' queued'):'Last one');
    }
    function renderRec(){
      rtrack.innerHTML=RECITEMS.map(function(it){return '<div class="rec-slide">'+recHTML(it)+'</div>';}).join('');
      rdots.innerHTML=RECITEMS.map(function(_,i){return '<i'+(i===rIdx?' class="on"':'')+'></i>';}).join('');
      [].forEach.call(rtrack.querySelectorAll('.rc-x,.rn-x'),function(x){x.addEventListener('click',function(e){e.stopPropagation();dismissRec();});});
      goRec(rIdx);
    }
    function dismissRec(){RECITEMS.splice(rIdx,1);if(!RECITEMS.length){strip.classList.add('empty');return;}if(rIdx>=RECITEMS.length)rIdx=RECITEMS.length-1;renderRec();}
    (function(){var sx=0,sw2=false,view=strip.querySelector('.rec-view');
      view.addEventListener('pointerdown',function(e){sx=e.clientX;sw2=true;});
      view.addEventListener('pointermove',function(e){if(!sw2)return;var dx=e.clientX-sx;if(Math.abs(dx)<36)return;sw2=false;goRec(rIdx+(dx<0?1:-1));});
      view.addEventListener('pointerup',function(){sw2=false;});view.addEventListener('pointerleave',function(){sw2=false;});
    })();
    renderRec();
    // 方案B 自包含演示(页面自己播, 不靠外部伸手): ?demo=widget=添加组件+聚焦; ?demo=notif=通知到达→沉入顶部推荐流
    var DEMO='';try{DEMO=(new URLSearchParams(location.search)).get('demo')||'';}catch(e){}
    if(!DEMO&&window.NEBULA_WIDGET_DEMO)DEMO='widget';
    if(DEMO==='widget'){
      function pokeFocus(i){var ts=dpinned.querySelectorAll('.di-pw');var t=ts[i]||ts[0];if(!t)return;var r=t.getBoundingClientRect(),o={clientX:r.left+r.width/2,clientY:r.top+r.height/2,bubbles:true};t.dispatchEvent(new PointerEvent('pointerdown',o));t.dispatchEvent(new PointerEvent('pointerup',o));}
      setTimeout(function(){compAdd.click();},1700);                                                    // ① 添加组件 → 组件库
      setTimeout(function(){var c=eplist.querySelector('.ep-card:not(.sel):not(.disabled)');if(c)c.click();},3400);  // ② 加一个新组件
      setTimeout(function(){closeEdit();},5000);                                                        // ③ 收起组件库
      setTimeout(function(){pokeFocus(1);},6100);                                                       // ④ 点选聚焦(看实时数值跳动)
      setTimeout(function(){pokeFocus(3);},8400);                                                       // ⑤ 再聚焦另一个
    } else if(DEMO==='notif'){
      setTimeout(function(){                                                                            // ① 底部灵动胶囊先动: 球→胶囊展开, 提示一条通知到达
        try{window.MVAIsland.present({title:'Notification',sub:'Manner Coffee spotted on your route',trail:'rec',accent:'feed'},{interval:9e8});}catch(e){}
      },900);
      setTimeout(function(){                                                                            // ② 再沉入顶部推荐流: 胶囊收起 → 卡片落入 feed
        try{window.MVAIsland.dismiss();}catch(e){}
        RECITEMS.unshift({form:'card',ic:'☕',tag:'Notification',hot:1,src:'On your route',t:'Manner Coffee spotted ahead',s:'1.2km · visited twice this week · add a stop?',act:'Add a stop'});
        rIdx=0;renderRec();
        var c=rtrack.querySelector('.rec-card');if(c){c.classList.add('rec-arrive');setTimeout(function(){c.classList.remove('rec-arrive');},2600);}
      },3200);
    }
  }
  function feedInner(f,newtag){   // .fcard 内部内容
    var media=f.pcov?('<img class="pcov" src="'+f.pcov+'" alt="">'):(f.fcov?('<img class="fcov" src="'+f.fcov+'" alt="">'):('<div class="fic">'+(f.ic||'✦')+'</div>'));
    return media+'<div style="min-width:0"><div class="ft">'+f.t+(newtag?'<span class="newtag">'+newtag+'</span>':'')+(f.tag?'<span class="ftag">'+f.tag+'</span>':'')+'</div>'
      +'<div class="fs">'+f.s+'</div></div><div class="fdel" title="Remove">✕</div>';
  }
  function feedCardHTML(f){     // 原版 .fcard 结构
    return '<div class="fcard'+(f.fresh?' fresh':'')+'">'+feedInner(f,f.fresh?'New':'')+'</div>';
  }
  function removeFeedCard(el){   // 删除一条推荐: 同步 curFeed + 收起动效移除
    var idx=[].indexOf.call(ftrack.children,el);
    if(idx>=0&&curFeed)curFeed.splice(idx,1);
    el.classList.add('arriving');
    setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},430);
  }
  function wireCard(c){
    c.addEventListener('click',function(){setView('content');});
    var d=c.querySelector('.fdel');
    if(d)d.addEventListener('click',function(e){e.stopPropagation();removeFeedCard(c);});
  }
  function buildFeed(list){
    ftrack.innerHTML=list.map(feedCardHTML).join('');
    [].forEach.call(ftrack.querySelectorAll('.fcard'),wireCard);
  }
  /* 一条 AI 推荐进来: feed 前台→顶部动效插卡; feed 隐藏→胶囊提示(且已进 feed 数据, 打开即在顶部) */
  /* 推荐 case 总表(仅这些, 不再出现其它): 来自业务清单 */
  var CASES=[
    {ic:'🔋',t:'Battery below 20%',s:'Charging station 3 km ahead — route there?',tag:'Maps'},
    {ic:'☕',t:"You've driven 2 hours straight",s:'Rest stop 5 km ahead — take a break?',tag:'Maps'},
    {ic:'🌅',t:'Golden-hour sky spotted',s:'Save this view to your gallery?',tag:'Gallery'},
    {ic:'🛡️',t:'Sentinel caught a risky event',s:'Just recorded — want to review it?',tag:'DVR'},
    {ic:'🛣️',t:'Turn on NOA assisted driving',s:'Let the car take the strain',tag:'ADAS'},
    {ic:'🎓',t:'Learn to unlock NOA',s:'Master assisted driving in minutes',tag:'ADAS'},
    {ic:'🌡️',t:'Tap to set a comfortable temp',s:'Cabin is outside the comfort zone',tag:'Climate'},
    {ic:'🧽',t:'Enable screen-cleaning mode?',s:'Lots of stray touches detected',tag:'Scene'},
    {ic:'🔊',t:'Navigation volume is 0',s:"You won't hear directions — turn it up?",tag:'Nav'},
    {ic:'🎃',t:'A holiday surprise is ready',s:'Halloween easter egg — tap to play',tag:'Surprise'}
  ],RECS=CASES,recIdx=0;
  function addRec(card){
    if((curFeed||DEFAULT_FEED).length>=4)return;                                 // 已有 4 条 → 停止生成
    card=card||RECS[(recIdx++)%RECS.length];
    curFeed=[Object.assign({fresh:true},card)].concat(curFeed||DEFAULT_FEED);   // 进 feed 数据
    if(curFeed.length>4)curFeed=curFeed.slice(0,4);                              // 上限 4 条
    if(activeView==='feed'&&vz&&vz.classList.contains('di-feedmode')){          // feed 在前台 → 顶部动效插一条
      var el=document.createElement('div');el.className='fcard arriving fresh';el.innerHTML=feedInner(card,'Just now');
      wireCard(el);
      ftrack.insertBefore(el,ftrack.firstChild);
      while(ftrack.children.length>4)ftrack.removeChild(ftrack.lastChild);
      requestAnimationFrame(function(){requestAnimationFrame(function(){el.classList.remove('arriving');});});
      setTimeout(function(){el.classList.remove('fresh');},4200);
    }else{                                                                       // feed 隐藏 → 底部胶囊提示有推荐进来
      present({title:card.t,sub:card.s,trail:'rec',accent:'feed'},{interval:999999});
    }
  }
  /* ---------- 双 view 切换器: content(场景生成的内容) <-> feed(推荐流) ----------
     胶囊永远展示"可切换到的那个 view"的入口; 点它就切到那个 view, 胶囊随之翻成另一个入口 */
  var activeView='content',engaged=false;
  var SC=SCENE();
  var T_CONTENT={title:SC.content.title,sub:SC.content.sub,trail:'done',accent:'content'};
  var T_FEED={title:'For You',sub:'4 new · tap to view',trail:'rec',accent:'feed'};   // 入口统一, 不出现具体的旧 case 文案
  var diMap=document.querySelector('.map');
  function setView(v){
    activeView=v;engaged=true;                       // 用户已交互 → 自动演示不再打断
    if(vz)vz.classList.remove('di-musicmode');if(playerwrap)playerwrap.classList.remove('open');  // 切 AI 内容/feed → 关音乐小窗
    stage.classList.remove('zone-hidden');         // 确保语音区可见
    if(v==='feed'){
      buildFeed(curFeed||DEFAULT_FEED);
      renderPinned();                              // 渲染固定区组件(含默认示例)
      if(vz)vz.classList.add('di-feedmode');       // 上面 = feed 流
      if(diMap)diMap.style.visibility='hidden';    // 隐藏地图等叠层, 避免透出
      requestAnimationFrame(function(){requestAnimationFrame(function(){feedwrap.classList.add('open');});});
    }else{
      feedwrap.classList.remove('open');
      if(diMap)diMap.style.visibility='';
      setTimeout(function(){if(activeView==='content'&&vz)vz.classList.remove('di-feedmode');},340); // 上面 = 场景内容
    }
    stopRotate();
    if(v==='feed')dismiss();                        // feed 流展开在上面 → 底部胶囊收起成光球(点球切回内容)
    else present(T_FEED,{interval:999999});          // content 时 → 胶囊展开显示"为你推荐"入口
  }
  function toggleView(){setView(activeView==='feed'?'content':'feed');}
  di.addEventListener('click',function(){toggleView();});  // 点胶囊=切到另一个 view(不依赖当前轮播条, 确定性)
  window.MVAIsland={present:present,update:update,dismiss:dismiss,advance:advance,setView:setView,toggleView:toggleView,addRec:addRec};

  /* ---------- 场景化内容: ①当前内容概况 ②AI推荐 (滚动轮播) + 点推荐展开的 feed ---------- */
  var DEFAULT_FEED=CASES.slice(0,4);             // 默认只展示 4 条(取 case 表前 4)
  function pickFeed(){return DEFAULT_FEED.slice();}   // 返回副本, 删除/插入不污染原表
  function SCENE(){     // 按页关键字取: gen=生成中文案, content=内容概况, feedT=推荐入口
    var t=(document.title||'')+' '+decodeURIComponent(location.pathname||'');
    function h(k){return t.indexOf(k)>=0;}
    if(h('雨')||h('天气'))    return {gen:'Generating tomorrow’s trip plan…',content:{title:'Trip plan · rain tomorrow',sub:'Feels 14° · bring an umbrella'},feedT:{title:'For you · leave by 7:40am',sub:'Avoid flooding · 4 more'}};
    if(h('导航')||h('目的地')) return {gen:'Planning your route…',content:{title:'Route planned · fast-charge stop',sub:'142 km · 1h 48m'},feedT:{title:'On the way · via Moganshan',sub:'Great weekend spot · 4 more'}};
    if(h('电影'))             return {gen:'Curating tonight’s picks…',content:{title:'3 top-rated movies for you',sub:'All under 90 min · commute-friendly'},feedT:{title:'You might like · a mystery short',sub:'Based on history · 4 more'}};
    if(h('氛围灯'))           return {gen:'Tuning the cabin mood…',content:{title:'Switched to “Gentle Night”',sub:'Warm pink · 40% bright'},feedT:{title:'Try · breathing light to the music',sub:'Synced to audio · 4 more'}};
    if(h('世界杯')||h('赛事')) return {gen:'Connecting to the live match…',content:{title:'Live · Argentina 1–0 France',sub:'67′ · Messi assist'},feedT:{title:'For you · first-half highlights',sub:'2-min recap · 4 more'}};
    if(h('记忆'))             return {gen:'Noting your preferences…',content:{title:'Saved · you like Eason Chan',sub:'Prioritized from now on'},feedT:{title:'For you · new single “Lonely Warrior”',sub:'Just released · 4 more'}};
    if(h('闲聊'))             return {gen:'Summarizing the chat…',content:{title:'Chat highlights organized',sub:'3 topics · cards generated'},feedT:{title:'For you · related content',sub:'From your chat · 4 more'}};
    if(h('舒适'))             return {gen:'Preparing a comfort scene…',content:{title:'Comfort scene ready',sub:'Seat · climate · scent set'},feedT:{title:'Try · Home mode',sub:'Auto-on before arrival · 4 more'}};
    if(h('飞花令'))           return {gen:'Writing a prompt…',content:{title:'Poetry game · round 3',sub:'Keyword “moon”'},feedT:{title:'Try · a different game',sub:'Idiom chain · 4 more'}};
    if(h('多人')||h('聊天'))   return {gen:'Syncing the group chat…',content:{title:'Back-seat talk transcribed',sub:'2 people · minutes ready'},feedT:{title:'For you · related content',sub:'4 more'}};
    if(h('思考')||h('指令'))   return {gen:'Thinking deeply…',content:{title:'Done · plan generated',sub:'3 steps'},feedT:{title:'For you · related content',sub:'4 more'}};
    if(h('负一屏')||h('车控')) return {gen:'Organizing car controls…',content:{title:'Control panel ready',sub:'Climate · media · charging'},feedT:{title:'For you · today',sub:'4 more'}};
    if(h('通知'))             return {gen:'Aggregating notifications…',content:{title:'3 notifications grouped',sub:'Sorted by priority'},feedT:{title:'For you · reminders',sub:'4 more'}};
    return {gen:'MVA is generating for you…',content:{title:'Today’s updates organized',sub:'Commute · media · reminders'},feedT:{title:'For you · 5 new',sub:'Live updates'}};
  }
  function runDemo(){
    curFeed=pickFeed();
    // 推荐陆续进来(涓流): 大部分时段没有, 偶尔来一条 → feed前台插卡 / feed隐藏弹胶囊
    function tick(){
      if(Math.random()<0.5)addRec();               // addRec 内部限 4 条
      if((curFeed||DEFAULT_FEED).length<4)setTimeout(tick,8000+Math.random()*6000);   // 满 4 条 → 停止随机生成
    }
    if((curFeed||DEFAULT_FEED).length<4)setTimeout(tick,2800);
  }

  /* ---------- 原有 busy/settle + 自动演示(静置即触发, 并加硬兜底) ---------- */
  var busy=true,settleT=null,demoed=false;
  function en(on){orb.classList.toggle('busy',!on);}
  function fireDemo(){if(demoed||engaged)return;demoed=true;runDemo();}
  function settle(){busy=false;en(true);setTimeout(fireDemo,1400);}
  function bump(){busy=true;en(false);clearTimeout(settleT);settleT=setTimeout(settle,1200);}
  try{var obs=new MutationObserver(bump);watch.forEach(function(n){obs.observe(n,{childList:true,subtree:true,characterData:true,attributes:true,attributeFilter:['class','style']});});}catch(e){}
  bump();
  setTimeout(fireDemo,5200);   // 硬兜底: 即使场景持续变动永不静置(如调试读数每帧刷新), 也保证胶囊冒出
  orb.onclick=function(){engaged=true;setView(activeView==='feed'?'content':'feed');};  // 点光球: 收起态→开feed, feed态→回内容
  orb.ondblclick=function(e){e.preventDefault();runDemo();};   // 双击光球: 随时重放灵动岛(便于查看/present)
  if(window.NEBULA_FEED_DEFAULT){engaged=true;curFeed=pickFeed();setView('feed');   // 负一屏: 默认即进全局 feed 视图
    if(!INVERT)setTimeout(function(){   // 首次进入手势指引(仅非方案B): 方案B 用「添加组件」按钮且演示太抢戏 → 不显示
      if(!feedwrap||!vz||!vz.classList.contains('di-feedmode'))return;
      var g=document.createElement('div');g.className='swipe-guide';
      g.innerHTML='<div class="sg-hint"><span class="ar">«</span>Swipe to add widgets</div>'
        +'<div class="sg-track"><div class="sg-trail"></div><div class="sg-hand"></div></div>';
      feedwrap.appendChild(g);
      setTimeout(function(){g.classList.add('gone');setTimeout(function(){if(g.parentNode)g.parentNode.removeChild(g);},560);},300+2*1400+150);
    },900);
  }

  if(/[?&]islandshow=1/.test(location.search)){   // 灵动岛单独展示模式(供录制): 收起↔消息进入↔展开↔收起 循环
    engaged=true;demoed=true;                      // 关掉常规自动演示, 避免干扰
    var ISMSGS=[
      {title:'Battery below 20%',sub:'Charging station 3 km ahead — route there?',trail:'rec',accent:'feed'},
      {title:'Sentinel caught a risky event',sub:'Just recorded — want to review it?',trail:'rec',accent:'feed'},
      {title:'Driven 2 hours straight',sub:'Rest stop 5 km ahead — take a break?',trail:'rec',accent:'content'}
    ];
    var isi=0;
    setTimeout(function isTick(){    // 先静置(收起态), 再逐条: 消息进入→展开→保持→收起→间隔
      present(ISMSGS[isi%ISMSGS.length],{hold:2300});
      isi++;
      setTimeout(isTick,2300+1900);
    },1100);
  }
  /* ========== 识别动效: avatar 右边的流动虹彩声波(取代上屏文字, 识别时随"音量"起伏) ========== */
  var svAsr=document.getElementById('svAsr');
  if(svAsr){
    var gx=document.createElement('div');gx.className='sv-glowfx';(stage||document.body).appendChild(gx);
    var COLORS=['#ff007f','#7928ca','#00dfd8','#0070f3','#ff6bb0','#a06bff'];
    var GW=340,blobs=[];
    for(var bi=0;bi<COLORS.length;bi++){
      var el=document.createElement('i'),w=104+(bi%3)*20,h=52,cx=34+bi*((GW-68)/(COLORS.length-1));
      el.style.left=cx+'px';el.style.width=w+'px';el.style.height=h+'px';
      el.style.marginLeft=(-w/2)+'px';el.style.marginTop=(-h/2)+'px';
      el.style.filter='blur('+(13+(bi%2)*3)+'px)';
      el.style.background='radial-gradient(ellipse,'+COLORS[bi]+',rgba(0,0,0,0) 70%)';   // 扁椭圆软光
      gx.appendChild(el);
      blobs.push({el:el,p:bi*1.25,sp:0.42+(bi%4)*0.12});   // sp=横向摆速; 相位错开→颜色横向流动
    }
    function placeGlow(){if(!svAsr)return;var av=document.getElementById('avatar');var cy=av?(stageY(av)+av.offsetHeight/2):(stageY(svAsr)+svAsr.offsetHeight/2);gx.style.left=stageX(svAsr)+'px';gx.style.top=(cy-3)+'px';}   // 垂直对齐 avatar 中心, 再上移一点
    placeGlow();try{addEventListener('resize',placeGlow);}catch(e){}
    var _env=0,_jt=0,_jitT=0,_jit=0,_pl=false;   // 识别时淡入; 只横向流动(无旋转/无上下扫); 说话→膨胀变亮
    (function vgFrame(now){
      var listening=svAsr.classList.contains('show')&&!svAsr.classList.contains('done');
      if(listening&&!_pl)placeGlow();_pl=listening;
      _env+=((listening?1:0)-_env)*0.08;
      gx.style.opacity=Math.min(1,_env*1.15).toFixed(2);
      if(_env>0.01){
        if(now-_jt>120){_jt=now;_jitT=listening?Math.random():0;}
        _jit+=(_jitT-_jit)*0.15;
        var amp=_env*(0.4+0.6*_jit),t=now*0.001;
        for(var i=0;i<blobs.length;i++){var bl=blobs[i];
          var dx=Math.sin(t*bl.sp+bl.p)*26*(0.5+amp);   // 只横向摆动/流动
          var sx=0.86+0.34*amp+0.07*Math.sin(t*0.9+bl.p);   // 只横向缩放(不往上下长→不溢出边界)
          bl.el.style.transform='translateX('+dx.toFixed(1)+'px) scaleX('+sx.toFixed(2)+')';
          bl.el.style.opacity=(0.5+0.42*amp).toFixed(2);
        }
      }
      requestAnimationFrame(vgFrame);
    })(performance.now());
  }
})();

/* ===== MVA 系统回复 TTS: 用预生成的 OpenAI 语音(tts/*.mp3)替代浏览器合成 —— 只念系统回复(.sv-reply / speak), 绝不念用户指令(.sv-asr) ===== */
(function(){
  function norm(s){return (s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();}
  var CLIP={
    'long day take a breather and relax':'tts/chat-1.mp3',
    'i m mercedes virtual assistant':'tts/chat-2.mp3',
    'moderate rain expected in shanghai tomorrow bring an umbrella':'tts/weather-1.mp3',
    'the glass is fogging up rain is falling outside':'tts/weather-2.mp3',
    'group a has 6 matches here is the full schedule':'tts/match-1.mp3',
    'sure i ve set the cabin light to warm pink for you':'tts/genui-1.mp3',
    'sure planning your multi stop route now':'tts/nav-1.mp3',
    'got it removing the kids pickup stop and re planning your route':'tts/nav-2.mp3',
    'done kids pickup removed continuing navigation':'tts/nav-3.mp3',
    'now playing ten years':'tts/music-1.mp3',
    'music window expanded switch to feed':'tts/music-2.mp3',
    'calling wei zhang':'tts/phone-1.mp3',
    'connected on call':'tts/phone-2.mp3'
  };
  var cur=null,q=[];
  function _next(){if(!q.length){cur=null;return;}cur=q.shift();cur.onended=_next;cur.onerror=_next;cur.play().catch(_next);}
  function mvaPlay(text){var f=CLIP[norm(text)];if(!f)return false;try{q.push(new Audio(f));if(!cur)_next();}catch(e){}return true;}   // 排队播放: 上一句播完再播下一句, 不打断
  window.mvaPlay=mvaPlay;
  try{var last=new WeakMap();[].forEach.call(document.querySelectorAll('.sv-reply'),function(el){
    new MutationObserver(function(){var t=(el.textContent||'').trim();if(t&&last.get(el)!==t){last.set(el,t);mvaPlay(t);}}).observe(el,{childList:true,characterData:true,subtree:true});
  });}catch(e){}                                  // 屏上系统回复 → 播对应语音
  try{if(typeof window.speak==='function'){var _spk=window.speak;window.speak=function(t){if(mvaPlay(t))return;return _spk.apply(this,arguments);};}}catch(e){}   // 闲聊页只 TTS → 包 speak()
})();
</script>
